kind = "web"
previewPath = "/"
title = "H2 Family Budget"
version = "1.0.0"
id = "artifacts/h2budget"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20333

[services.development]
run = "pnpm --filter @workspace/h2budget run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/h2budget", "run", "build" ]
publicDir = "artifacts/h2budget/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20333"
BASE_PATH = "/"
