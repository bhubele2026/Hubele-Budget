components:
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status: { type: string }

    Transaction:
      type: object
      required: [id, occurredOn, description, amount, forecastFlag, weeklyAllowance, monthlyAllowance, unplannedAllowance, reimbursable, reimbursed, isTransfer, source]
      properties:
        id: { type: string }
        occurredOn: { type: string }
        occurredAt: { type: ["string", "null"] }
        description: { type: string }
        amount: { type: string }
        account: { type: ["string", "null"] }
        categoryId: { type: ["string", "null"] }
        forecastFlag: { type: boolean }
        weeklyAllowance: { type: boolean }
        weeklyBucket: { type: ["string", "null"], enum: [groceries, dining, entertainment, misc, null] }
        monthlyAllowance: { type: boolean }
        unplannedAllowance: { type: boolean }
        reimbursable: { type: boolean }
        reimbursed: { type: boolean }
        isTransfer: { type: boolean }
        notes: { type: ["string", "null"] }
        source: { type: string }
        member: { type: ["string", "null"] }
        owedBy: { type: ["string", "null"] }
        plaidTransactionId: { type: ["string", "null"] }
        plaidAccountId: { type: ["string", "null"] }
        debtId: { type: ["string", "null"] }
        matchedRuleId:
          type: ["string", "null"]
          description: |
            Id of the mapping rule that auto-categorize would currently
            attribute for this row, or null when no rule matches (e.g. the
            category was set manually). Computed server-side per list
            response — not persisted on the row — so editing a rule's
            pattern reflects on every existing transaction without a
            backfill. Powers the "matched by rule X · jump to it" affordance
            on the Transactions and Amex pages.
    CreateTransactionInput:
      type: object
      required: [occurredOn, description, amount]
      properties:
        occurredOn: { type: string }
        occurredAt: { type: ["string", "null"] }
        description: { type: string, minLength: 1 }
        amount: { type: string }
        account: { type: ["string", "null"] }
        categoryId: { type: ["string", "null"] }
        forecastFlag: { type: boolean }
        weeklyAllowance: { type: boolean }
        weeklyBucket: { type: ["string", "null"], enum: [groceries, dining, entertainment, misc, null] }
        monthlyAllowance: { type: boolean }
        unplannedAllowance: { type: boolean }
        reimbursable: { type: boolean }
        reimbursed: { type: boolean }
        isTransfer: { type: boolean }
        notes: { type: ["string", "null"] }
        source: { type: string }
        member: { type: ["string", "null"] }
        owedBy: { type: ["string", "null"] }
        debtId: { type: ["string", "null"] }
    TransactionInput:
      type: object
      properties:
        occurredOn: { type: string }
        occurredAt: { type: ["string", "null"] }
        description: { type: string, minLength: 1 }
        amount: { type: string }
        account: { type: ["string", "null"] }
        categoryId: { type: ["string", "null"] }
        forecastFlag: { type: boolean }
        weeklyAllowance: { type: boolean }
        weeklyBucket: { type: ["string", "null"], enum: [groceries, dining, entertainment, misc, null] }
        monthlyAllowance: { type: boolean }
        unplannedAllowance: { type: boolean }
        reimbursable: { type: boolean }
        reimbursed: { type: boolean }
        isTransfer: { type: boolean }
        notes: { type: ["string", "null"] }
        source: { type: string }
        member: { type: ["string", "null"] }
        owedBy: { type: ["string", "null"] }
        debtId: { type: ["string", "null"] }
        rememberPattern:
          type: ["string", "null"]
          description: |
            When set together with `categoryId`, the server upserts a
            mapping_rule (matchType=contains, priority=100) so that future
            transactions with this description fragment auto-categorize the
            same way. Used by the "Categorize + remember" affordance on the
            Transactions and Amex pages.

    RepointedRule:
      type: object
      required: [ruleId, pattern, matchType, fromCategoryId, toCategoryId, candidateCount, sampleTransactions]
      description: |
        Reported by PATCH /transactions/:id when the auto-learn flow
        repoints an existing mapping rule onto a new category. `candidateCount`
        is the number of older transactions that match this rule's pattern
        and currently sit in the rule's old category, i.e. the count that
        would be flipped if the user accepts the "apply to past transactions
        too" prompt and POSTs to /transactions/recategorize-by-pattern with
        these fields. `sampleTransactions` is a small preview (most-recent
        first, capped at 10) so the client can render a "Show matches" list
        before the user confirms the bulk re-categorize.
      properties:
        ruleId: { type: string }
        pattern: { type: string }
        matchType: { type: string, enum: [contains, exact, starts_with] }
        fromCategoryId: { type: string }
        toCategoryId: { type: string }
        candidateCount: { type: integer }
        sampleTransactions:
          type: array
          description: |
            First ~10 affected transactions, ordered most-recent first.
            Each entry is a thin slice (id, description, occurredOn, amount)
            sufficient for the toast's "Show matches" preview dialog.
          items: { $ref: "#/components/schemas/RepointedRuleSample" }

    RepointedRuleSample:
      type: object
      required: [id, description, occurredOn, amount]
      properties:
        id: { type: string }
        description: { type: string }
        occurredOn: { type: string }
        amount: { type: string }
        matchedRuleId:
          type: ["string", "null"]
          description: |
            Id of the mapping rule that auto-categorize would currently
            attribute for this sample row in its *present* category, or
            null when no rule matches. Computed server-side identically
            to the GET /transactions annotation so the "Show matches"
            preview dialog can render the same MatchedRuleChip
            (deep-link to /mapping-rules?focus=<id> or "manually
            categorized" hint) as every other transaction-list surface.

    RuleAction:
      type: object
      required: [kind]
      description: |
        Summary of what the auto-learn flow did to the user's mapping
        rules in response to this PATCH. Surfaced as a small toast/note
        so the user understands why future similar charges will (or
        won't) auto-categorize. The repoint case is also reported in
        more detail via `repointedRules` (which drives the "apply to
        past transactions too" prompt). For the `created` /
        `created_priority_bump` cases, the action also carries the
        match metadata + candidate count needed to drive the same
        "apply to past charges?" prompt against older *uncategorized*
        rows that match the freshly created rule.
      properties:
        kind:
          type: string
          enum:
            - created
            - created_priority_bump
            - skipped_generic
            - repointed
            - none
          description: |
            * `created` — a new specific mapping rule was added for the
              derived pattern.
            * `created_priority_bump` — a new specific rule was added
              and given a priority above an existing generic rule that
              also matches; both rules are kept and the specific one
              wins on future similar charges.
            * `skipped_generic` — the auto-derived pattern would have
              clobbered an existing generic rule, so no rule was
              created. The generic rule is unchanged.
            * `repointed` — at least one existing matching specific
              rule was repointed onto the new category; no new rule was
              created (the repoint covers it).
            * `none` — nothing interesting happened (e.g. transfer,
              same-category no-op, or no derivable pattern).
        pattern:
          type: ["string", "null"]
          description: |
            Pattern for the new or repointed rule. Set for `created`,
            `created_priority_bump`, `skipped_generic`, and `repointed`.
        genericPattern:
          type: ["string", "null"]
          description: |
            For `created_priority_bump` and `skipped_generic` — the
            existing generic (1-token) pattern that already matches
            this description and was deliberately left alone.
        ruleId:
          type: ["string", "null"]
          description: |
            Id of the rule the auto-learn flow created or repointed.
            Set for `created`, `created_priority_bump`, and `repointed`
            so the client can offer an Undo affordance from the toast
            (DELETE the just-created rule, or PATCH the repointed rule
            back to its previous category). Null for `skipped_generic`
            and `none`.
        previousCategoryId:
          type: ["string", "null"]
          description: |
            For `repointed` — the rule's previous categoryId before
            this PATCH moved it onto the user's chosen category. Used
            by the client's Undo affordance to restore the rule's
            original aim. Null for the other kinds.
        matchType:
          type: ["string", "null"]
          enum: [contains, exact, starts_with, null]
          description: |
            Match type of the freshly created rule. Set for `created`
            and `created_priority_bump`. The client passes this
            through to /transactions/recategorize-by-pattern when the
            user accepts the "apply to past charges?" prompt.
        toCategoryId:
          type: ["string", "null"]
          description: |
            The category the freshly created rule points at. Set for
            `created` and `created_priority_bump`. Used as the
            `toCategoryId` for the bulk recategorize call when the
            user accepts the "apply to past charges?" prompt.
        candidateCount:
          type: ["integer", "null"]
          description: |
            For `created` and `created_priority_bump` — the count of
            older *uncategorized* transactions that match the freshly
            created rule's pattern (excluding the row that triggered
            the auto-learn). This is what would be flipped onto
            `toCategoryId` if the user accepts the "apply to past
            charges?" prompt and POSTs to
            /transactions/recategorize-by-pattern with
            `fromCategoryId: null`. Manually-categorized older rows
            are deliberately excluded so explicit user intent is
            preserved.

    UpdateTransactionResponse:
      allOf:
        - $ref: "#/components/schemas/Transaction"
        - type: object
          required: [repointedRules, ruleAction]
          properties:
            repointedRules:
              type: array
              items: { $ref: "#/components/schemas/RepointedRule" }
              description: |
                Empty unless this PATCH triggered the auto-learn flow to
                repoint one or more existing mapping rules onto a new
                category. The client surfaces this as a "apply to past
                transactions too" prompt.
            ruleAction:
              $ref: "#/components/schemas/RuleAction"

    CreateTransactionResponse:
      allOf:
        - $ref: "#/components/schemas/Transaction"
        - type: object
          required: [autoCategorizedRuleId]
          properties:
            autoCategorizedRuleId:
              type: ["string", "null"]
              description: |
                Id of the mapping rule that auto-attributed this row's
                `categoryId` during POST /transactions. Set only when the
                client OMITTED `categoryId` from the body AND the
                auto-categorize pipeline matched a rule. Null when the
                client passed an explicit categoryId, when no rule
                matched, or when the description was empty. The Add-
                Transaction client uses this to surface a small
                "matched by rule X" confirmation toast that links to the
                Mapping Rules page and offers an Undo affordance to
                clear the auto-picked category from the new row (without
                deleting the row itself).

    RecategorizeByPatternInput:
      type: object
      required: [pattern, matchType, fromCategoryId, toCategoryId]
      properties:
        pattern: { type: string, minLength: 1 }
        matchType: { type: string, enum: [contains, exact, starts_with] }
        fromCategoryId:
          type: ["string", "null"]
          description: |
            Only transactions currently in this category are touched.
            Transactions manually re-categorized to a different category
            are skipped to preserve explicit user intent. Pass `null`
            to target rows that are currently *uncategorized* — used
            by the "apply to past charges?" prompt that fires after
            the auto-learn flow creates a brand-new specific rule
            (the candidates are older uncategorized rows that match
            the new pattern; manually categorized rows are
            preserved).
        toCategoryId: { type: string }
        ids:
          type: array
          maxItems: 1000
          description: |
            Optional whitelist of transaction ids to scope the bulk
            update to. When provided, the server only flips rows whose
            id is in this list AND whose categoryId still equals
            `fromCategoryId`. Used by the client's "Undo" affordance to
            revert exactly the rows that the original bulk touched,
            skipping any the user has since re-edited. Capped at 1000
            ids per request — a longer list is rejected with a 400 to
            prevent a hand-crafted payload from stalling the API; in
            practice the array is bounded by what currently matches
            the pattern, well below this cap.
          items: { type: string }
        ruleId:
          type: string
          description: |
            Optional id of the mapping rule whose previous re-point
            should be reversed alongside the transaction flip. When
            provided, the server also updates that rule's categoryId
            to `toCategoryId` (after verifying ownership). The "Undo"
            affordance passes the original rule id with `from`/`to`
            swapped so future matching transactions stop snapping
            onto the user's accidental category pick.

    RecategorizeByPatternResult:
      type: object
      required: [updated, affectedMonths, affectedIds]
      properties:
        updated:
          type: integer
          description: Number of transactions whose categoryId was flipped.
        affectedMonths:
          type: array
          description: |
            Distinct YYYY-MM-01 month-start strings spanning the updated
            transactions. Clients invalidate the corresponding budget month
            queries so per-line actuals refresh.
          items: { type: string }
        affectedIds:
          type: array
          description: |
            Ids of the transactions whose categoryId was flipped. The
            client passes these back into the same endpoint with `from`
            and `to` swapped (and `ids` set) to implement one-click
            "Undo" of a bulk recategorization.
          items: { type: string }

    UncategorizeByIdsInput:
      type: object
      required: [ids, fromCategoryId]
      properties:
        ids:
          type: array
          maxItems: 1000
          description: |
            Whitelist of transaction ids whose categoryId should be cleared.
            Only rows owned by the requesting user are touched. An
            explicitly-empty list is a no-op so callers can pass through a
            degenerate Undo payload (e.g. a bulk that flipped 0 rows)
            without affecting unrelated data. Capped at 1000 ids per
            request — a longer list is rejected with a 400 to prevent
            a runaway "Undo" from stalling the API; the Add-flow's bulk
            undo passes back exactly the ids it just touched, so the
            practical ceiling is whatever pattern matched, well below
            this cap.
          items: { type: string }
        fromCategoryId:
          type: ["string", "null"]
          description: |
            Guard category — only rows whose categoryId still equals this
            value are flipped to null. Pass the category id the rows were
            moved into by the original bulk so any rows the user has since
            re-edited (away from that category) are preserved. Pass `null`
            to allow flipping rows that are already uncategorized — that's
            still a no-op for those rows but keeps the same surface
            reusable for future "from anywhere" callers.

    UncategorizeByIdsResult:
      type: object
      required: [updated, affectedMonths, affectedIds]
      properties:
        updated:
          type: integer
          description: Number of transactions whose categoryId was cleared.
        affectedMonths:
          type: array
          description: |
            Distinct YYYY-MM-01 month-start strings spanning the cleared
            transactions. Clients invalidate the corresponding budget month
            queries so per-line actuals refresh.
          items: { type: string }
        affectedIds:
          type: array
          description: |
            Ids of the transactions whose categoryId was actually cleared.
            Mirrors RecategorizeByPatternResult.affectedIds so the toast
            can report a precise count to the user.
          items: { type: string }

    BulkSetForecastFlagInput:
      type: object
      required: [ids, forecastFlag]
      properties:
        ids:
          type: array
          description: |
            Transaction ids to flip. Only rows owned by the requesting
            user whose current `forecast_flag` differs from the target
            value are touched — rows already at the target value are
            silently skipped so a re-issue (e.g. one-click "Undo") is
            safe even when the user has since toggled some rows back
            by hand.
          items: { type: string }
        forecastFlag:
          type: boolean
          description: |
            Target value for `forecast_flag`. When `false` the server
            also drops any forecast_resolutions pointing at the
            affected rows (mirroring the per-row PATCH cleanup) so the
            Forecast inbox/bucket stays consistent.

    BulkSetForecastFlagResult:
      type: object
      required: [updated, affectedIds]
      properties:
        updated:
          type: integer
          description: Number of transactions whose forecast_flag was flipped.
        affectedIds:
          type: array
          description: |
            Ids of the transactions whose forecast_flag was actually
            flipped. The client passes these back to the same endpoint
            with `forecastFlag` inverted to implement one-click "Undo"
            of a bulk Send-to-Forecast / Remove-from-Forecast — rows
            the user has since re-toggled by hand are naturally
            skipped because their current value already matches the
            new target.
          items: { type: string }

    Debt:
      type: object
      required: [id, name, balance, apr, minPayment, payment, status, sortOrder, balanceSource, aprSource, minPaymentSource]
      properties:
        id: { type: string }
        name: { type: string }
        balance: { type: string }
        originalBalance: { type: ["string", "null"] }
        apr: { type: string }
        minPayment: { type: string }
        payment: { type: string }
        type: { type: ["string", "null"] }
        status: { type: string }
        sortOrder: { type: integer }
        dueDay: { type: ["integer", "null"] }
        statementDay: { type: ["integer", "null"] }
        notes: { type: ["string", "null"] }
        lastBalanceUpdate: { type: ["string", "null"] }
        plaidAccountId: { type: ["string", "null"] }
        plaidLastSyncedAt: { type: ["string", "null"] }
        plaidLastSyncError:
          type: ["string", "null"]
          description: |
            Latest sync error from the parent Plaid item, surfaced on debts
            so users see when balance/APR/min-payment values may be stale
            because Plaid refresh is failing (e.g. ITEM_LOGIN_REQUIRED).
            null when sync is healthy or the debt isn't Plaid-linked.
        plaidLastSyncErrorCode:
          type: ["string", "null"]
          description: |
            Structured `error_code` from the parent Plaid item's last failed
            sync (e.g. ITEM_LOGIN_REQUIRED, PENDING_EXPIRATION). Mirrors the
            value on the parent PlaidItem so the Debts / Avalanche UI can
            decide when to render an inline "Reconnect" affordance on the
            row. null when sync is healthy or the debt isn't Plaid-linked.
        plaidConsentExpirationAt:
          type: ["string", "null"]
          description: |
            (#238) ISO timestamp mirroring the parent Plaid item's
            `consent_expiration_time` — the cutoff after which the bank
            will be auto-disconnected unless the user re-consents. Powers
            the dated PENDING_EXPIRATION / PENDING_DISCONNECT subline copy
            on the DebtReauthBanner ("Chase will disconnect on May 21 —
            reconnect now to keep it linked."). Null when the debt isn't
            Plaid-linked or Plaid never reported a cutoff for the item.
        plaidConsentExpirationLastRefreshError:
          type: ["string", "null"]
          description: |
            (#320) Mirrors the parent Plaid item's
            `consentExpirationLastRefreshError` — the latest /item/get
            failure captured during the consent-refresh path (manual
            "Refresh disconnect dates" button, on-sync PENDING_EXPIRATION
            refresh, or daily cron). Surfaced on debts so the inline
            DebtReauthBanner can warn users when the disconnect-date
            check itself has been failing ("Couldn't verify disconnect
            date: …"), not just when a sync failed. Null when the
            consent-refresh path is healthy or the debt isn't
            Plaid-linked.
        balanceSource: { type: string, enum: [plaid, manual] }
        aprSource: { type: string, enum: [plaid, manual] }
        minPaymentSource: { type: string, enum: [plaid, manual] }
        pendingPaymentTotal:
          type: ["string", "null"]
          description: |
            (#421) Sum (as a money string, e.g. "200.00") of payment-direction
            transactions tagged to this debt that the creditor has not yet
            reflected in the reported `balance`. A transaction counts as
            pending when it's tagged to the debt (auto or manual), has a
            positive (payment-direction) amount, and is dated strictly after
            the debt's last creditor-reported balance timestamp
            (`plaidLastSyncedAt` for Plaid-sourced debts; `lastBalanceUpdate`
            for manual). The Avalanche / Debts UI subtracts this from
            `balance` to render an "effective" balance and show a small
            "−$X pending" hint. Null when the debt has no pending payments.
        pendingPaymentCount:
          type: ["integer", "null"]
          description: |
            (#421) Number of tagged payment-direction transactions counted
            in `pendingPaymentTotal`. Null / 0 when there are none.
        plaidAccount:
          oneOf:
            - $ref: "#/components/schemas/DebtPlaidAccount"
            - type: "null"
