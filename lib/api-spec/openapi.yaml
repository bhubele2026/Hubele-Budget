              schema: { $ref: "#/components/schemas/PlaidEnvironmentInfo" }
  /plaid/refresh-consent-expirations:
    post:
      operationId: refreshPlaidConsentExpirations
      tags: [plaid]
      summary: |
        (#253) Manually refresh `consent_expiration_time` for every Plaid
        item belonging to the caller. Same code path as the daily 03:17
        UTC cron job — exposed so users can self-serve from Settings when
        they suspect the disconnect-date countdown is stale, without
        waiting up to 24h for the next scheduled run.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PlaidConsentRefreshResult" }
  /plaid/cleanup-non-prod:
