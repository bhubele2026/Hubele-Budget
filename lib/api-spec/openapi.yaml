openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: H2 Family Budget API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
  - name: dashboard
  - name: transactions
  - name: debts
  - name: recurring
  - name: budget
  - name: mapping
  - name: settings
  - name: import
  - name: forecast
  - name: dashboard-budgets
  - name: auth
  - name: invitations
  - name: members
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema: { $ref: "#/components/schemas/HealthStatus" }

  /dashboard:
    get:
      operationId: getDashboard
      tags: [dashboard]
      summary: Dashboard summary
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DashboardSummary" }

  /transactions:
    get:
      operationId: listTransactions
      tags: [transactions]
      parameters:
        - in: query
          name: from
          schema: { type: string }
        - in: query
          name: to
          schema: { type: string }
        - in: query
          name: limit
          schema: { type: integer }
        - in: query
          name: source
          schema: { type: string }
        - in: query
          name: uncategorized
          schema: { type: boolean }
        - in: query
          name: excludeTransfers
          schema: { type: boolean }
        - in: query
          name: reimbursable
          schema: { type: boolean }
        - in: query
          name: search
          schema: { type: string }
        - in: query
          name: minAmount
          schema: { type: string }
        - in: query
          name: maxAmount
          schema: { type: string }
        - in: query
          name: categoryId
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Transaction" }
    post:
      operationId: createTransaction
      tags: [transactions]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateTransactionInput" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Transaction" }
  /transactions/{id}:
    patch:
      operationId: updateTransaction
      tags: [transactions]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/TransactionInput" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/UpdateTransactionResponse" }
    delete:
      operationId: deleteTransaction
      tags: [transactions]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "204": { description: Deleted }

  /transactions/recategorize-by-pattern:
    post:
      operationId: recategorizeTransactionsByPattern
      tags: [transactions]
      summary: |
        Bulk re-categorize past transactions whose description matches a
        mapping rule's pattern and that currently sit in the rule's old
        category. Used by the "apply this rule to past transactions too"
        prompt that surfaces after the auto-relearn flow repoints a seed
        rule (e.g. an Amex/Cap One/Discover debt-payment rule moving from
        "Misc / Buffer" onto the user's real per-debt category).
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/RecategorizeByPatternInput" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RecategorizeByPatternResult" }

  /debts:
    get:
      operationId: listDebts
      tags: [debts]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Debt" }
    post:
      operationId: createDebt
      tags: [debts]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/DebtInput" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Debt" }
  /debts/{id}/link:
    post:
      operationId: linkDebtToPlaid
      tags: [debts]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/DebtLinkInput" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Debt" }
  /debts/{id}/unlink:
    post:
      operationId: unlinkDebtFromPlaid
      tags: [debts]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Debt" }
  /debts/{id}/refresh:
    post:
      operationId: refreshDebtFromPlaid
      tags: [debts]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Debt" }
  /plaid/liability-accounts:
    get:
      operationId: listPlaidLiabilityAccounts
      tags: [plaid]
      parameters:
        - in: query
          name: refresh
          schema: { type: boolean }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/PlaidLiabilityAccount" }
  /debts/balance-history:
    get:
      operationId: listDebtBalanceHistory
      tags: [debts]
      summary: All recorded balance snapshots for the current user's debts
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/DebtBalanceHistoryEntry" }
  /debts/sync-minimums:
    post:
      operationId: syncDebtMinimums
      tags: [debts]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SyncMinimumsResult" }
  /avalanche/extra:
    get:
      operationId: getAvalancheExtra
      tags: [avalanche]
      summary: Resolved monthly extra-payment amount
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AvalancheExtra" }
  /debts/{id}/payments:
    post:
      operationId: createDebtPayment
      tags: [debts]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/DebtPaymentInput" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DebtPaymentResult" }
  /avalanche/settings:
    get:
      operationId: getAvalancheSettings
      tags: [avalanche]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AvalancheSettings" }
    put:
      operationId: updateAvalancheSettings
      tags: [avalanche]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AvalancheSettingsInput" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AvalancheSettings" }
  /debts/{id}:
    patch:
      operationId: updateDebt
      tags: [debts]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/DebtInput" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Debt" }
    delete:
      operationId: deleteDebt
      tags: [debts]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "204": { description: Deleted }

  /recurring-items:
    get:
      operationId: listRecurringItems
      tags: [recurring]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/RecurringItem" }
    post:
      operationId: createRecurringItem
      tags: [recurring]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/RecurringItemInput" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RecurringItem" }
  /recurring-items/{id}:
    patch:
      operationId: updateRecurringItem
      tags: [recurring]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/RecurringItemInput" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RecurringItem" }
    delete:
      operationId: deleteRecurringItem
      tags: [recurring]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "204": { description: Deleted }

  /budget/categories:
    get:
      operationId: listCategories
      tags: [budget]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Category" }
    post:
      operationId: createCategory
      tags: [budget]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CategoryInput" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Category" }
  /budget/categories/{id}:
    delete:
      operationId: deleteCategory
      tags: [budget]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "204": { description: Deleted }

  /budget/months/{monthStart}:
    get:
      operationId: getBudgetMonth
      tags: [budget]
      parameters:
        - in: path
          name: monthStart
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/BudgetMonthDetail" }

  /budget/seed-defaults:
    post:
      operationId: seedDefaultBudget
      tags: [budget]
      summary: Seed default categories and May 2026 budget lines (idempotent)
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SeedDefaultBudgetResult" }

  /budget/lines:
    post:
      operationId: upsertBudgetLine
      tags: [budget]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/BudgetLineInput" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/BudgetLine" }

  /budget/months/{monthStart}/pin:
    post:
      operationId: pinBudgetMonth
      tags: [budget]
      summary: |
        Pin (or unpin) every auto-pulled line in a month to its currently
        displayed planned amount, so the persisted value is preferred over the
        live Bills/Debts derivation. Pinning snapshots the current derived
        amounts into budget_lines; unpinning leaves the snapshot in place but
        causes the response to fall back to the live derivation again.
      parameters:
        - in: path
          name: monthStart
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PinBudgetMonthInput" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PinResult" }

  /budget/lines/pin:
    post:
      operationId: pinBudgetLine
      tags: [budget]
      summary: |
        Pin (or unpin) a single auto-pulled budget line for a given month so
        the persisted planned amount is preferred over the live derivation.
        Pinning snapshots the current derived amount into budget_lines.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PinBudgetLineInput" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PinResult" }

  /mapping-rules:
    get:
      operationId: listMappingRules
      tags: [mapping]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/MappingRule" }
    post:
      operationId: createMappingRule
      tags: [mapping]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/MappingRuleInput" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MappingRule" }
  /mapping-rules/{id}:
    patch:
      operationId: updateMappingRule
      tags: [mapping]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/MappingRuleInput" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MappingRule" }
    delete:
      operationId: deleteMappingRule
      tags: [mapping]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "204": { description: Deleted }

  /mapping-rules/reorder:
    put:
      operationId: reorderMappingRules
      tags: [mapping]
      description: |
        Replace the priority of every rule whose id appears in `orderedIds`.
        The first id is treated as the highest-priority rule. The server
        rewrites priorities to a contiguous descending sequence so subsequent
        single-rule edits and the auto-learn flow have plenty of headroom on
        either side. Returns the full updated rule list (priority-sorted,
        same shape as GET /mapping-rules).
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ReorderMappingRulesInput" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/MappingRule" }

  /mapping-rules/test:
    post:
      operationId: testMappingRules
      tags: [mapping]
      description: |
        Preview which of the user's mapping rules would match the given
        description, in priority order. The first entry (if any) is the rule
        the auto-categorize flow would actually pick.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/TestMappingRulesInput" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TestMappingRulesResult" }

  /settings:
    get:
      operationId: getSettings
      tags: [settings]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Settings" }
    put:
      operationId: updateSettings
      tags: [settings]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/SettingsInput" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Settings" }

  /forecast:
    get:
      operationId: getForecast
      tags: [forecast]
      parameters:
        - in: query
          name: days
          schema: { type: integer }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ForecastBundle" }

  /forecast/settings:
    get:
      operationId: getForecastSettings
      tags: [forecast]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ForecastSettings" }
    put:
      operationId: updateForecastSettings
      tags: [forecast]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ForecastSettingsInput" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ForecastSettings" }

  /forecast/resolutions:
    post:
      operationId: upsertForecastResolution
      tags: [forecast]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ForecastResolutionInput" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ForecastResolution" }
  /forecast/resolutions/{id}:
    delete:
      operationId: deleteForecastResolution
      tags: [forecast]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "204": { description: Deleted }

  /forecast/bank-snapshot:
    post:
      operationId: setForecastBankSnapshot
      tags: [forecast]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/SetBankSnapshotInput" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/BankSnapshot" }
  /forecast/refresh-bank:
    post:
      operationId: refreshForecastBank
      tags: [forecast]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/BankSnapshot" }
  /forecast/cash-signal:
    get:
      operationId: getForecastCashSignal
      tags: [forecast]
      parameters:
        - in: query
          name: horizonDays
          schema: { type: integer }
        - in: query
          name: fromDate
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CashSignal" }

  /forecast/closed-months:
    post:
      operationId: closeForecastMonth
      tags: [forecast]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [monthKey]
              properties:
                monthKey: { type: string }
                gap: { type: ["string", "null"] }
                forecastEnd: { type: ["string", "null"] }
                bankEnd: { type: ["string", "null"] }
                pending: { type: ["integer", "null"] }
                reconciled: { type: ["boolean", "null"] }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ForecastClosedMonth" }
  /forecast/closed-months/{monthKey}:
    delete:
      operationId: reopenForecastMonth
      tags: [forecast]
      parameters:
        - in: path
          name: monthKey
          required: true
          schema: { type: string }
      responses:
        "204": { description: Deleted }

  /dashboard-budgets:
    get:
      operationId: listDashboardBudgets
      tags: [dashboard-budgets]
      parameters:
        - in: query
          name: bucket
          schema: { type: string }
        - in: query
          name: periodKey
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/DashboardBudget" }
    put:
      operationId: upsertDashboardBudget
      tags: [dashboard-budgets]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/DashboardBudgetInput" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DashboardBudget" }
    delete:
      operationId: deleteDashboardBudget
      tags: [dashboard-budgets]
      parameters:
        - in: query
          name: bucket
          required: true
          schema: { type: string }
        - in: query
          name: periodKey
          required: true
          schema: { type: string }
      responses:
        "204": { description: Deleted }

  /plaid/link-token:
    post:
      operationId: createPlaidLinkToken
      tags: [plaid]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PlaidLinkToken" }
  /plaid/link-token/update:
    post:
      operationId: createPlaidUpdateLinkToken
      tags: [plaid]
      summary: |
        Create a Plaid Link token in update mode for an existing item, so the
        user can re-authenticate the bank when Plaid reports
        ITEM_LOGIN_REQUIRED (or another re-auth code).
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PlaidUpdateLinkTokenInput" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PlaidLinkToken" }
  /plaid/exchange:
    post:
      operationId: exchangePlaidPublicToken
      tags: [plaid]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PlaidExchangeInput" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PlaidItemDetail" }
  /plaid/items:
    get:
      operationId: listPlaidItems
      tags: [plaid]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/PlaidItemDetail" }
  /plaid/items/{id}:
    delete:
      operationId: deletePlaidItem
      tags: [plaid]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "204": { description: Deleted }
  /plaid/sync:
    post:
      operationId: syncPlaidTransactions
      tags: [plaid]
      requestBody:
        required: false
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PlaidSyncInput" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PlaidSyncResult" }
  /plaid/environment:
    get:
      operationId: getPlaidEnvironment
      tags: [plaid]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PlaidEnvironmentInfo" }
  /plaid/cleanup-non-prod:
    post:
      operationId: cleanupNonProdPlaidItems
      tags: [plaid]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [removed]
                properties:
                  removed: { type: integer }

  /bills/summary:
    get:
      operationId: getBillsSummary
      tags: [bills]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/BillsSummary" }

  /import/workbook:
    post:
      operationId: importWorkbook
      tags: [import]
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ImportSummary" }

  /me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Returns information about the current authenticated user, including whether they are the owner.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MeResponse" }

  /invitations:
    get:
      operationId: listInvitations
      tags: [invitations]
      summary: List all invitations (owner only).
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Invitation" }
        "403":
          description: Forbidden
    post:
      operationId: createInvitation
      tags: [invitations]
      summary: Send a new invitation by email (owner only).
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateInvitationInput" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Invitation" }
        "403":
          description: Forbidden

  /invitations/{id}:
    delete:
      operationId: revokeInvitation
      tags: [invitations]
      summary: Revoke a pending invitation (owner only).
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Invitation" }
        "403":
          description: Forbidden

  /invitations/{id}/resend:
    post:
      operationId: resendInvitation
      tags: [invitations]
      summary: Resend a pending invitation (owner only). Revokes the existing invite and creates a new one for the same email.
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Invitation" }
        "403":
          description: Forbidden

  /invitations/check:
    post:
      operationId: checkInvitation
      tags: [invitations]
      summary: Check whether the given email has a pending invitation. Public endpoint used by the sign-in page to help invited users who try to sign in before accepting their email invite.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CheckInvitationInput" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CheckInvitationResult" }

  /members:
    get:
      operationId: listMembers
      tags: [members]
      summary: List all current members (owner only).
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Member" }
        "403":
          description: Forbidden

  /members/{id}:
    delete:
      operationId: removeMember
      tags: [members]
      summary: Remove a member's access (owner only). Deletes the Clerk user and their profile row.
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "204":
          description: Removed
        "400":
          description: Cannot remove the owner
        "403":
          description: Forbidden

  /seed/april-chase:
    post:
      operationId: seedAprilChase
      tags: [import]
      summary: Seed the user's Chase checking with April 2026 transactions (idempotent)
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AprilChaseSeedResult" }

components:
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status: { type: string }

    Transaction:
      type: object
      required: [id, occurredOn, description, amount, forecastFlag, weeklyAllowance, monthlyAllowance, unplannedAllowance, reimbursable, reimbursed, isTransfer, source]
      properties:
        id: { type: string }
        occurredOn: { type: string }
        occurredAt: { type: ["string", "null"] }
        description: { type: string }
        amount: { type: string }
        account: { type: ["string", "null"] }
        categoryId: { type: ["string", "null"] }
        forecastFlag: { type: boolean }
        weeklyAllowance: { type: boolean }
        weeklyBucket: { type: ["string", "null"], enum: [groceries, dining, entertainment, misc, null] }
        monthlyAllowance: { type: boolean }
        unplannedAllowance: { type: boolean }
        reimbursable: { type: boolean }
        reimbursed: { type: boolean }
        isTransfer: { type: boolean }
        notes: { type: ["string", "null"] }
        source: { type: string }
        member: { type: ["string", "null"] }
        owedBy: { type: ["string", "null"] }
        plaidTransactionId: { type: ["string", "null"] }
        plaidAccountId: { type: ["string", "null"] }
        debtId: { type: ["string", "null"] }
    CreateTransactionInput:
      type: object
      required: [occurredOn, description, amount]
      properties:
        occurredOn: { type: string }
        occurredAt: { type: ["string", "null"] }
        description: { type: string, minLength: 1 }
        amount: { type: string }
        account: { type: ["string", "null"] }
        categoryId: { type: ["string", "null"] }
        forecastFlag: { type: boolean }
        weeklyAllowance: { type: boolean }
        weeklyBucket: { type: ["string", "null"], enum: [groceries, dining, entertainment, misc, null] }
        monthlyAllowance: { type: boolean }
        unplannedAllowance: { type: boolean }
        reimbursable: { type: boolean }
        reimbursed: { type: boolean }
        isTransfer: { type: boolean }
        notes: { type: ["string", "null"] }
        source: { type: string }
        member: { type: ["string", "null"] }
        owedBy: { type: ["string", "null"] }
        debtId: { type: ["string", "null"] }
    TransactionInput:
      type: object
      properties:
        occurredOn: { type: string }
        occurredAt: { type: ["string", "null"] }
        description: { type: string, minLength: 1 }
        amount: { type: string }
        account: { type: ["string", "null"] }
        categoryId: { type: ["string", "null"] }
        forecastFlag: { type: boolean }
        weeklyAllowance: { type: boolean }
        weeklyBucket: { type: ["string", "null"], enum: [groceries, dining, entertainment, misc, null] }
        monthlyAllowance: { type: boolean }
        unplannedAllowance: { type: boolean }
        reimbursable: { type: boolean }
        reimbursed: { type: boolean }
        isTransfer: { type: boolean }
        notes: { type: ["string", "null"] }
        source: { type: string }
        member: { type: ["string", "null"] }
        owedBy: { type: ["string", "null"] }
        debtId: { type: ["string", "null"] }
        rememberPattern:
          type: ["string", "null"]
          description: |
            When set together with `categoryId`, the server upserts a
            mapping_rule (matchType=contains, priority=100) so that future
            transactions with this description fragment auto-categorize the
            same way. Used by the "Categorize + remember" affordance on the
            Transactions and Amex pages.

    RepointedRule:
      type: object
      required: [ruleId, pattern, matchType, fromCategoryId, toCategoryId, candidateCount, sampleTransactions]
      description: |
        Reported by PATCH /transactions/:id when the auto-learn flow
        repoints an existing mapping rule onto a new category. `candidateCount`
        is the number of older transactions that match this rule's pattern
        and currently sit in the rule's old category, i.e. the count that
        would be flipped if the user accepts the "apply to past transactions
        too" prompt and POSTs to /transactions/recategorize-by-pattern with
        these fields. `sampleTransactions` is a small preview (most-recent
        first, capped at 10) so the client can render a "Show matches" list
        before the user confirms the bulk re-categorize.
      properties:
        ruleId: { type: string }
        pattern: { type: string }
        matchType: { type: string, enum: [contains, exact, starts_with] }
        fromCategoryId: { type: string }
        toCategoryId: { type: string }
        candidateCount: { type: integer }
        sampleTransactions:
          type: array
          description: |
            First ~10 affected transactions, ordered most-recent first.
            Each entry is a thin slice (id, description, occurredOn, amount)
            sufficient for the toast's "Show matches" preview dialog.
          items: { $ref: "#/components/schemas/RepointedRuleSample" }

    RepointedRuleSample:
      type: object
      required: [id, description, occurredOn, amount]
      properties:
        id: { type: string }
        description: { type: string }
        occurredOn: { type: string }
        amount: { type: string }

    RuleAction:
      type: object
      required: [kind]
      description: |
        Summary of what the auto-learn flow did to the user's mapping
        rules in response to this PATCH. Surfaced as a small toast/note
        so the user understands why future similar charges will (or
        won't) auto-categorize. The repoint case is also reported in
        more detail via `repointedRules` (which drives the "apply to
        past transactions too" prompt).
      properties:
        kind:
          type: string
          enum:
            - created
            - created_priority_bump
            - skipped_generic
            - repointed
            - none
          description: |
            * `created` — a new specific mapping rule was added for the
              derived pattern.
            * `created_priority_bump` — a new specific rule was added
              and given a priority above an existing generic rule that
              also matches; both rules are kept and the specific one
              wins on future similar charges.
            * `skipped_generic` — the auto-derived pattern would have
              clobbered an existing generic rule, so no rule was
              created. The generic rule is unchanged.
            * `repointed` — at least one existing matching specific
              rule was repointed onto the new category; no new rule was
              created (the repoint covers it).
            * `none` — nothing interesting happened (e.g. transfer,
              same-category no-op, or no derivable pattern).
        pattern:
          type: ["string", "null"]
          description: |
            Pattern for the new or repointed rule. Set for `created`,
            `created_priority_bump`, `skipped_generic`, and `repointed`.
        genericPattern:
          type: ["string", "null"]
          description: |
            For `created_priority_bump` and `skipped_generic` — the
            existing generic (1-token) pattern that already matches
            this description and was deliberately left alone.

    UpdateTransactionResponse:
      allOf:
        - $ref: "#/components/schemas/Transaction"
        - type: object
          required: [repointedRules, ruleAction]
          properties:
            repointedRules:
              type: array
              items: { $ref: "#/components/schemas/RepointedRule" }
              description: |
                Empty unless this PATCH triggered the auto-learn flow to
                repoint one or more existing mapping rules onto a new
                category. The client surfaces this as a "apply to past
                transactions too" prompt.
            ruleAction:
              $ref: "#/components/schemas/RuleAction"

    RecategorizeByPatternInput:
      type: object
      required: [pattern, matchType, fromCategoryId, toCategoryId]
      properties:
        pattern: { type: string, minLength: 1 }
        matchType: { type: string, enum: [contains, exact, starts_with] }
        fromCategoryId:
          type: string
          description: |
            Only transactions currently in this category are touched.
            Transactions manually re-categorized to a different category
            are skipped to preserve explicit user intent.
        toCategoryId: { type: string }
        ids:
          type: array
          description: |
            Optional whitelist of transaction ids to scope the bulk
            update to. When provided, the server only flips rows whose
            id is in this list AND whose categoryId still equals
            `fromCategoryId`. Used by the client's "Undo" affordance to
            revert exactly the rows that the original bulk touched,
            skipping any the user has since re-edited.
          items: { type: string }

    RecategorizeByPatternResult:
      type: object
      required: [updated, affectedMonths, affectedIds]
      properties:
        updated:
          type: integer
          description: Number of transactions whose categoryId was flipped.
        affectedMonths:
          type: array
          description: |
            Distinct YYYY-MM-01 month-start strings spanning the updated
            transactions. Clients invalidate the corresponding budget month
            queries so per-line actuals refresh.
          items: { type: string }
        affectedIds:
          type: array
          description: |
            Ids of the transactions whose categoryId was flipped. The
            client passes these back into the same endpoint with `from`
            and `to` swapped (and `ids` set) to implement one-click
            "Undo" of a bulk recategorization.
          items: { type: string }

    Debt:
      type: object
      required: [id, name, balance, apr, minPayment, payment, status, sortOrder, balanceSource, aprSource, minPaymentSource]
      properties:
        id: { type: string }
        name: { type: string }
        balance: { type: string }
        originalBalance: { type: ["string", "null"] }
        apr: { type: string }
        minPayment: { type: string }
        payment: { type: string }
        type: { type: ["string", "null"] }
        status: { type: string }
        sortOrder: { type: integer }
        dueDay: { type: ["integer", "null"] }
        statementDay: { type: ["integer", "null"] }
        notes: { type: ["string", "null"] }
        lastBalanceUpdate: { type: ["string", "null"] }
        plaidAccountId: { type: ["string", "null"] }
        plaidLastSyncedAt: { type: ["string", "null"] }
        plaidLastSyncError:
          type: ["string", "null"]
          description: |
            Latest sync error from the parent Plaid item, surfaced on debts
            so users see when balance/APR/min-payment values may be stale
            because Plaid refresh is failing (e.g. ITEM_LOGIN_REQUIRED).
            null when sync is healthy or the debt isn't Plaid-linked.
        balanceSource: { type: string, enum: [plaid, manual] }
        aprSource: { type: string, enum: [plaid, manual] }
        minPaymentSource: { type: string, enum: [plaid, manual] }
        plaidAccount:
          oneOf:
            - $ref: "#/components/schemas/DebtPlaidAccount"
            - type: "null"
    DebtPlaidAccount:
      type: object
      required: [id]
      properties:
        id: { type: string }
        name: { type: ["string", "null"] }
        mask: { type: ["string", "null"] }
        type: { type: ["string", "null"] }
        subtype: { type: ["string", "null"] }
        liabilityKind: { type: ["string", "null"] }
        institutionName: { type: ["string", "null"] }
        institutionSlug: { type: ["string", "null"] }
    DebtInput:
      type: object
      properties:
        name: { type: string, minLength: 1 }
        balance: { type: string }
        apr: { type: string }
        minPayment: { type: string }
        payment: { type: string }
        type: { type: ["string", "null"] }
        status: { type: string }
        sortOrder: { type: integer }
        dueDay: { type: ["integer", "null"] }
        statementDay: { type: ["integer", "null"] }
        notes: { type: ["string", "null"] }
        lastBalanceUpdate: { type: ["string", "null"] }
    DebtBalanceHistoryEntry:
      type: object
      required: [debtId, recordedOn, balance]
      properties:
        debtId: { type: string }
        recordedOn: { type: string, description: "YYYY-MM-DD" }
        balance: { type: string }
    DebtLinkInput:
      type: object
      required: [plaidAccountId]
      properties:
        plaidAccountId: { type: string }
    PlaidLiabilityAccount:
      type: object
      required: [id, accountId]
      properties:
        id: { type: string }
        accountId: { type: string }
        name: { type: ["string", "null"] }
        officialName: { type: ["string", "null"] }
        mask: { type: ["string", "null"] }
        type: { type: ["string", "null"] }
        subtype: { type: ["string", "null"] }
        liabilityKind: { type: ["string", "null"] }
        balance: { type: ["string", "null"] }
        apr: { type: ["string", "null"] }
        minPayment: { type: ["string", "null"] }
        lastFetchedAt: { type: ["string", "null"] }
        institutionId: { type: ["string", "null"] }
        institutionName: { type: ["string", "null"] }
        institutionSlug: { type: ["string", "null"] }
        linkedDebt:
          oneOf:
            - type: object
              required: [id, name]
              properties:
                id: { type: string }
                name: { type: string }
            - type: "null"
    AvalancheSettings:
      type: object
      required: [strategy, extraSource, manualExtra, budgetMode]
      properties:
        strategy: { type: string, enum: [avalanche, snowball] }
        extraSource: { type: string, enum: [budget_net, budget_line, manual] }
        extraBudgetCategoryId: { type: ["string", "null"] }
        manualExtra: { type: string }
        budgetMode: { type: string, enum: [budgeted, actual] }
    AvalancheSettingsInput:
      type: object
      properties:
        strategy: { type: string, enum: [avalanche, snowball] }
        extraSource: { type: string, enum: [budget_net, budget_line, manual] }
        extraBudgetCategoryId: { type: ["string", "null"] }
        manualExtra: { type: string }
        budgetMode: { type: string, enum: [budgeted, actual] }
    AvalancheExtra:
      type: object
      required: [source, amount, monthStart]
      properties:
        source: { type: string, enum: [budget_net, budget_line, manual] }
        amount: { type: string }
        monthStart: { type: string }
        mode: { type: string, enum: [budgeted, actual] }
        availableMoney: { type: string }
        plannedAvalanchePayment: { type: string }
        plannedIncome: { type: string }
        plannedExpenses: { type: string }
        breakdown:
          type: object
          properties:
            income: { type: string }
            expenses: { type: string }
            plannedIncome: { type: string }
            plannedExpenses: { type: string }
            categoryId: { type: ["string", "null"] }
            categoryName: { type: ["string", "null"] }
            planned: { type: string }
            actual: { type: string }
    DebtPaymentInput:
      type: object
      required: [amount, occurredOn]
      properties:
        amount: { type: string }
        occurredOn: { type: string }
        account: { type: ["string", "null"] }
        notes: { type: ["string", "null"] }
    DebtPaymentResult:
      type: object
      required: [debt, transaction, killed]
      properties:
        debt: { $ref: "#/components/schemas/Debt" }
        transaction: { $ref: "#/components/schemas/Transaction" }
        killed: { type: boolean }
    SyncMinimumsResult:
      type: object
      required: [updated]
      properties:
        updated:
          type: array
          items:
            type: object
            required: [id, name, oldMin, newMin]
            properties:
              id: { type: string }
              name: { type: string }
              oldMin: { type: string }
              newMin: { type: string }

    RecurringItem:
      type: object
      required: [id, name, kind, amount, frequency, active]
      properties:
        id: { type: string }
        name: { type: string }
        kind: { type: string }
        amount: { type: string }
        frequency: { type: string }
        dayOfMonth: { type: ["integer", "null"] }
        anchorDate: { type: ["string", "null"] }
        active: { type: string }
        categoryId: { type: ["string", "null"] }
        debtId: { type: ["string", "null"] }
    RecurringItemInput:
      type: object
      required: [name]
      properties:
        name: { type: string }
        kind: { type: string }
        amount: { type: string }
        frequency: { type: string }
        dayOfMonth: { type: ["integer", "null"] }
        anchorDate: { type: ["string", "null"] }
        active: { type: string }
        categoryId: { type: ["string", "null"] }
        debtId: { type: ["string", "null"] }

    BillsSummaryRow:
      type: object
      required: [item, nextOccurrence, monthlyAmount]
      properties:
        item: { $ref: "#/components/schemas/RecurringItem" }
        nextOccurrence: { type: ["string", "null"] }
        monthlyAmount: { type: string }
    BillsSummaryMonthly:
      type: object
      required: [income, bills, debtMin, totalOutflow, net, active, monthStart, monthEnd]
      properties:
        income: { type: string }
        bills: { type: string }
        debtMin: { type: string }
        totalOutflow: { type: string }
        net: { type: string }
        active: { type: integer }
        monthStart: { type: string }
        monthEnd: { type: string }
    BillsDebtMinRow:
      type: object
      required: [debtId, debtName, amount, minPayment, source, locked]
      properties:
        debtId: { type: string }
        debtName: { type: string }
        amount: { type: string }
        minPayment: { type: string }
        nextOccurrence: { type: ["string", "null"] }
        source: { type: string, enum: [plaid, manual] }
        locked: { type: boolean }
        linkedRecurringId: { type: ["string", "null"] }
        dueDay: { type: ["integer", "null"] }
    BillsSummary:
      type: object
      required: [income, bills, debtMins, monthly]
      properties:
        income:
          type: array
          items: { $ref: "#/components/schemas/BillsSummaryRow" }
        bills:
          type: array
          items: { $ref: "#/components/schemas/BillsSummaryRow" }
        debtMins:
          type: array
          items: { $ref: "#/components/schemas/BillsDebtMinRow" }
        monthly: { $ref: "#/components/schemas/BillsSummaryMonthly" }

    Category:
      type: object
      required: [id, name, kind, groupName, sourceKind, sortOrder]
      properties:
        id: { type: string }
        name: { type: string }
        kind: { type: string }
        groupName: { type: string }
        sourceKind: { type: string, enum: [manual, auto_bills, auto_debts] }
        sortOrder: { type: integer }
    CategoryInput:
      type: object
      required: [name]
      properties:
        name: { type: string }
        kind: { type: string }
        groupName: { type: string }
        sourceKind: { type: string, enum: [manual, auto_bills, auto_debts] }
        sortOrder: { type: integer }

    BudgetLine:
      type: object
      required: [id, monthStart, categoryId, plannedAmount]
      properties:
        id: { type: string }
        monthStart: { type: string }
        categoryId: { type: string }
        plannedAmount: { type: string }
        note: { type: ["string", "null"] }
    BudgetLineInput:
      type: object
      required: [monthStart, categoryId, plannedAmount]
      properties:
        monthStart: { type: string }
        categoryId: { type: string }
        plannedAmount: { type: string }
        note: { type: ["string", "null"] }
    PinBudgetMonthInput:
      type: object
      required: [pinned]
      properties:
        pinned: { type: boolean }
    PinBudgetLineInput:
      type: object
      required: [monthStart, categoryId, pinned]
      properties:
        monthStart: { type: string }
        categoryId: { type: string }
        pinned: { type: boolean }
    PinResult:
      type: object
      required: [monthStart, monthPinned, linesPinned]
      properties:
        monthStart: { type: string }
        monthPinned: { type: boolean }
        linesPinned: { type: integer }
    BudgetMonthDetail:
      type: object
      required: [monthStart, monthPinned, lines, groups, summary]
      properties:
        monthStart: { type: string }
        note: { type: ["string", "null"] }
        monthPinned:
          type: boolean
          description: |
            True when the user has pinned this month, which causes every
            auto-pulled line with a persisted budget_lines value to use that
            stored value instead of the live Bills/Debts derivation.
        lines:
          type: array
          items: { $ref: "#/components/schemas/BudgetLineWithActual" }
        groups:
          type: array
          items: { $ref: "#/components/schemas/BudgetGroup" }
        summary: { $ref: "#/components/schemas/BudgetSummary" }
    BudgetLineWithActual:
      type: object
      required: [categoryId, categoryName, plannedAmount, actualAmount, groupName, sourceKind, sortOrder, kind, pinned]
      properties:
        id: { type: ["string", "null"] }
        categoryId: { type: string }
        categoryName: { type: string }
        plannedAmount: { type: string }
        actualAmount: { type: string }
        note: { type: ["string", "null"] }
        groupName: { type: string }
        sourceKind: { type: string, enum: [manual, auto_bills, auto_debts] }
        sortOrder: { type: integer }
        kind: { type: string }
        pinned:
          type: boolean
          description: |
            True when this line's persisted planned amount is being used in
            place of the live Bills/Debts derivation. Driven by either the
            month-level pin or the per-line pin.
        sourceBreakdown:
          type: array
          description: |
            Per-source breakdown of the actuals that contribute to this
            budget line. Used to render Bank/Amex badges with counts on the
            budget page so the user can see at a glance where the spend came
            from. Transfers are excluded from these counts.
          items:
            type: object
            required: [source, count, amount]
            properties:
              source: { type: string, enum: [Bank, Amex, Other] }
              count: { type: integer }
              amount: { type: string }
    BudgetGroup:
      type: object
      required: [groupName, plannedTotal, actualTotal, lines]
      properties:
        groupName: { type: string }
        plannedTotal: { type: string }
        actualTotal: { type: string }
        lines:
          type: array
          items: { $ref: "#/components/schemas/BudgetLineWithActual" }
    BudgetSummaryPair:
      type: object
      required: [budget, actual]
      properties:
        budget: { type: string }
        actual: { type: string }
    BudgetSummary:
      type: object
      required: [income, expenses, net, percentSpent]
      properties:
        income: { $ref: "#/components/schemas/BudgetSummaryPair" }
        expenses: { $ref: "#/components/schemas/BudgetSummaryPair" }
        net: { $ref: "#/components/schemas/BudgetSummaryPair" }
        percentSpent: { $ref: "#/components/schemas/BudgetSummaryPair" }
    SeedDefaultBudgetResult:
      type: object
      required: [categoriesInserted, linesInserted, alreadySeeded]
      properties:
        categoriesInserted: { type: integer }
        linesInserted: { type: integer }
        mappingRulesInserted: { type: integer }
        alreadySeeded: { type: boolean }
    AprilChaseSeedResult:
      type: object
      required: [alreadySeeded, inserted, skipped, categorized, transfers, rulesAdded, endingBalance, syntheticAccount, accountId, snapshotRepaired]
      properties:
        alreadySeeded: { type: boolean }
        inserted: { type: integer }
        skipped: { type: integer }
        categorized: { type: integer }
        transfers: { type: integer }
        rulesAdded: { type: integer }
        endingBalance: { type: string }
        syntheticAccount: { type: boolean }
        accountId: { type: string }
        snapshotRepaired:
          type: boolean
          description: True when an existing manual bank snapshot still equal to the prior incorrect April ending balance was rewritten to the corrected value during this seed run. Use to invalidate cached forecast / bank snapshot queries even when no transactions or rules were inserted.

    MappingRule:
      type: object
      required: [id, pattern, matchType, priority]
      properties:
        id: { type: string }
        pattern: { type: string }
        matchType: { type: string }
        categoryId: { type: ["string", "null"] }
        priority: { type: integer }
    MappingRuleInput:
      type: object
      required: [pattern]
      properties:
        pattern: { type: string }
        matchType: { type: string }
        categoryId: { type: ["string", "null"] }
        priority: { type: integer }

    ReorderMappingRulesInput:
      type: object
      required: [orderedIds]
      properties:
        orderedIds:
          type: array
          description: |
            Rule IDs in the desired display order, highest priority first.
            IDs not belonging to the calling user are ignored. IDs of rules
            the user owns but that are missing from this list keep their
            existing priorities and rank below the reordered set.
          items: { type: string }

    TestMappingRulesInput:
      type: object
      required: [description]
      properties:
        description:
          type: string
          description: Transaction description fragment to test against the user's rules.

    TestMappingRulesMatch:
      type: object
      required: [rule, winner]
      properties:
        rule: { $ref: "#/components/schemas/MappingRule" }
        winner:
          type: boolean
          description: |
            True for the single rule the auto-categorize flow would pick
            (highest-priority match with a non-null categoryId).

    TestMappingRulesResult:
      type: object
      required: [matches, winningCategoryId]
      properties:
        matches:
          type: array
          description: |
            Every rule whose pattern matches the description, sorted by
            priority descending — same order the categorize() hot path uses.
          items: { $ref: "#/components/schemas/TestMappingRulesMatch" }
        winningCategoryId:
          type: ["string", "null"]
          description: |
            The category that auto-categorize would assign, or null when no
            matching rule has a category.

    WeeklyBucketLabels:
      type: object
      properties:
        groceries: { type: string }
        dining: { type: string }
        entertainment: { type: string }
        misc: { type: string }
    DaysSinceTracker:
      type: object
      required: [id, label, matchType, matchValue]
      properties:
        id: { type: string }
        label: { type: string }
        matchType: { type: string, enum: [category, keyword] }
        matchValue: { type: string }
    SettingsPreferences:
      type: object
      properties:
        weeklyBucketLabels: { $ref: "#/components/schemas/WeeklyBucketLabels" }
        daysSinceTrackers:
          type: array
          items: { $ref: "#/components/schemas/DaysSinceTracker" }
    Settings:
      type: object
      required: [weeklyAllowanceAmount, monthlyAllowanceAmount, unplannedAllowanceAmount]
      properties:
        weeklyAllowanceAmount: { type: string }
        monthlyAllowanceAmount: { type: string }
        unplannedAllowanceAmount: { type: string }
        primaryAccount: { type: ["string", "null"] }
        preferences:
          oneOf:
            - $ref: "#/components/schemas/SettingsPreferences"
            - type: "null"
    SettingsInput:
      type: object
      properties:
        weeklyAllowanceAmount: { type: string }
        monthlyAllowanceAmount: { type: string }
        unplannedAllowanceAmount: { type: string }
        primaryAccount: { type: ["string", "null"] }
        preferences:
          oneOf:
            - $ref: "#/components/schemas/SettingsPreferences"
            - type: "null"

    MeResponse:
      type: object
      required: [userId, isOwner]
      properties:
        userId: { type: string }
        email: { type: ["string", "null"] }
        displayName: { type: ["string", "null"] }
        isOwner: { type: boolean }

    Invitation:
      type: object
      required: [id, emailAddress, status, createdAt, updatedAt]
      properties:
        id: { type: string }
        emailAddress: { type: string }
        status: { type: string, enum: [pending, accepted, revoked, expired] }
        createdAt: { type: integer }
        updatedAt: { type: integer }
        url: { type: ["string", "null"] }
        revoked: { type: ["boolean", "null"] }

    CreateInvitationInput:
      type: object
      required: [email]
      properties:
        email: { type: string, format: email }

    CheckInvitationInput:
      type: object
      required: [email]
      properties:
        email: { type: string, format: email }

    CheckInvitationResult:
      type: object
      required: [email, hasPending]
      properties:
        email: { type: string }
        hasPending: { type: boolean }

    Member:
      type: object
      required: [id, isOwner]
      properties:
        id: { type: string }
        email: { type: ["string", "null"] }
        displayName: { type: ["string", "null"] }
        imageUrl: { type: ["string", "null"] }
        isOwner: { type: boolean }
        createdAt: { type: ["integer", "null"] }
        lastSignInAt: { type: ["integer", "null"] }

    DashboardSummary:
      type: object
      required: [totalDebt, monthlyIncome, monthlySpend, netCashflow, debtCount, activeDebtCount, paidThisMonth, paidLifetime, transactionCount, recentTransactions, topCategories, upcomingBills]
      properties:
        totalDebt: { type: string }
        monthlyIncome: { type: string }
        monthlySpend: { type: string }
        netCashflow: { type: string }
        debtCount: { type: integer }
        activeDebtCount: { type: integer }
        paidThisMonth: { type: string }
        paidLifetime: { type: string }
        transactionCount: { type: integer }
        recentTransactions:
          type: array
          items: { $ref: "#/components/schemas/Transaction" }
        topCategories:
          type: array
          items:
            type: object
            required: [categoryName, total]
            properties:
              categoryName: { type: string }
              total: { type: string }
        upcomingBills:
          type: array
          items: { $ref: "#/components/schemas/RecurringItem" }

    ForecastEvent:
      type: object
      required: [date, itemId, label, kind, amount]
      properties:
        date: { type: string }
        itemId: { type: string }
        label: { type: string }
        kind: { type: string }
        amount: { type: number }
    ForecastResolution:
      type: object
      required: [id, status]
      properties:
        id: { type: string }
        recurringItemId: { type: ["string", "null"] }
        occurrenceDate: { type: ["string", "null"] }
        status: { type: string }
        matchedTxnId: { type: ["string", "null"] }
        rescheduledTo: { type: ["string", "null"] }
        txnDate: { type: ["string", "null"] }
        txnDescription: { type: ["string", "null"] }
        txnAmount: { type: ["string", "null"] }
        txnForecastFlag: { type: ["boolean", "null"] }
    ForecastResolutionInput:
      type: object
      required: [status]
      properties:
        recurringItemId: { type: ["string", "null"] }
        occurrenceDate: { type: ["string", "null"] }
        status: { type: string }
        matchedTxnId: { type: ["string", "null"] }
        rescheduledTo: { type: ["string", "null"] }
    ForecastClosedMonth:
      type: object
      required: [id, monthKey]
      properties:
        id: { type: string }
        monthKey: { type: string }
    ForecastSettings:
      type: object
      required: [daysAhead, startingBalance, cashBuffer]
      properties:
        daysAhead: { type: integer }
        startingBalance: { type: string }
        cashBuffer: { type: string }
    ForecastSettingsInput:
      type: object
      properties:
        daysAhead: { type: integer }
        startingBalance: { type: string }
        cashBuffer: { type: string }
    BankSnapshot:
      type: object
      required: [balance, at, source]
      properties:
        balance: { type: string }
        at: { type: string }
        source: { type: string, enum: [manual, plaid] }
        accountId: { type: ["string", "null"] }
        name: { type: ["string", "null"] }
        mask: { type: ["string", "null"] }
    PlaidCheckingAccount:
      type: object
      required: [id, accountId]
      properties:
        id: { type: string }
        accountId: { type: string }
        name: { type: ["string", "null"] }
        mask: { type: ["string", "null"] }
        subtype: { type: ["string", "null"] }
        institutionName: { type: ["string", "null"] }
    CashSignal:
      type: object
      required: [bankToday, lowestProjected, lowestDate, cashBuffer, status, maxSafeExtra]
      properties:
        bankToday: { type: string }
        lowestProjected: { type: string }
        lowestDate: { type: ["string", "null"] }
        cashBuffer: { type: string }
        status: { type: string, enum: [ready, tight, not_yet, no_data] }
        maxSafeExtra: { type: string }
        snapshotAt: { type: ["string", "null"] }
        snapshotSource: { type: ["string", "null"] }
        horizonDays: { type: integer }
        fromDate: { type: string }
        toDate: { type: string }
        startingBalance: { type: string }
        endingBalance: { type: string }
        endingDate: { type: ["string", "null"] }
        projectedIncome: { type: string }
        projectedExpenses: { type: string }
        acceptedImpact: { type: string }
        daily:
          type: array
          items:
            type: object
            required: [date, balance]
            properties:
              date: { type: string }
              balance: { type: string }
    ForecastBundle:
      type: object
      required: [events, transactions, resolutions, closedMonths, settings, fromDate, toDate, plaidCheckingAccounts]
      properties:
        fromDate: { type: string }
        toDate: { type: string }
        events:
          type: array
          items: { $ref: "#/components/schemas/ForecastEvent" }
        transactions:
          type: array
          items: { $ref: "#/components/schemas/Transaction" }
        resolutions:
          type: array
          items: { $ref: "#/components/schemas/ForecastResolution" }
        closedMonths:
          type: array
          items: { type: string }
        settings: { $ref: "#/components/schemas/ForecastSettings" }
        bankSnapshot:
          oneOf:
            - $ref: "#/components/schemas/BankSnapshot"
            - type: "null"
        cashSignal:
          oneOf:
            - $ref: "#/components/schemas/CashSignal"
            - type: "null"
        plaidCheckingAccounts:
          type: array
          items: { $ref: "#/components/schemas/PlaidCheckingAccount" }
        monthSnapshots:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/MonthSnapshot"
    MonthSnapshot:
      type: object
      required: [balance, at]
      properties:
        balance: { type: string }
        at: { type: string }
        gap: { type: ["string", "null"] }
        forecastEnd: { type: ["string", "null"] }
        bankEnd: { type: ["string", "null"] }
        pending: { type: ["integer", "null"] }
        reconciled: { type: ["boolean", "null"] }
        closedAt: { type: ["string", "null"] }
    SetBankSnapshotInput:
      type: object
      properties:
        balance: { type: ["string", "null"] }
        plaidAccountId: { type: ["string", "null"] }

    DashboardBudget:
      type: object
      required: [id, bucket, periodKey, amount, isDefault]
      properties:
        id: { type: string }
        bucket: { type: string }
        periodKey: { type: string }
        amount: { type: string }
        isDefault: { type: boolean }
    DashboardBudgetInput:
      type: object
      required: [bucket, periodKey, amount]
      properties:
        bucket: { type: string }
        periodKey: { type: string }
        amount: { type: string }

    ImportSummary:
      type: object
      required: [batchId, counts]
      properties:
        batchId: { type: string }
        counts:
          type: object
          additionalProperties:
            type: integer

    PlaidLinkToken:
      type: object
      required: [linkToken, expiration]
      properties:
        linkToken: { type: string }
        expiration: { type: string }
    PlaidUpdateLinkTokenInput:
      type: object
      required: [itemId]
      properties:
        itemId:
          type: string
          description: |
            Internal Plaid item row id (UUID) of the item that needs
            re-authentication. Used to look up the stored access_token and
            create a Plaid Link token in update mode.
    PlaidExchangeInput:
      type: object
      required: [publicToken]
      properties:
        publicToken: { type: string }
        institutionId: { type: ["string", "null"] }
        institutionName: { type: ["string", "null"] }
    PlaidAccount:
      type: object
      required: [id, accountId]
      properties:
        id: { type: string }
        accountId: { type: string }
        name: { type: ["string", "null"] }
        officialName: { type: ["string", "null"] }
        mask: { type: ["string", "null"] }
        type: { type: ["string", "null"] }
        subtype: { type: ["string", "null"] }
    PlaidItemDetail:
      type: object
      required: [id, itemId, institutionSlug, accounts]
      properties:
        id: { type: string }
        itemId: { type: string }
        institutionId: { type: ["string", "null"] }
        institutionName: { type: ["string", "null"] }
        institutionSlug: { type: string }
        lastSyncedAt: { type: ["string", "null"] }
        lastSyncError: { type: ["string", "null"] }
        lastSyncErrorCode:
          type: ["string", "null"]
          description: |
            Plaid's structured `error_code` from the most recent failed
            sync (e.g. ITEM_LOGIN_REQUIRED, INVALID_CREDENTIALS,
            PENDING_EXPIRATION). Null when sync is healthy or when the
            previous failure had no structured code. Used by the UI to
            decide when to surface the "Reconnect" button next to the
            sync chip.
        # True when Plaid most recently returned PRODUCT_NOT_READY for this
        # item — the bank is still staging its historical batch. The Settings
        # page renders a neutral "Still preparing" badge so the user can tell
        # which institution is in the warm-up window vs. genuinely healthy.
        # Cleared on the next successful sync.
        stillPreparing: { type: boolean }
        # ISO timestamp of when this item first entered the still-preparing
        # state (i.e. when Plaid first returned PRODUCT_NOT_READY for it).
        # The Settings page uses this to render "Preparing for 12m / 3h" so
        # the user can tell a freshly linked bank from one that's stalled.
        # Null whenever stillPreparing is false.
        stillPreparingSince: { type: ["string", "null"] }
        accounts:
          type: array
          items: { $ref: "#/components/schemas/PlaidAccount" }
    PlaidSyncInput:
      type: object
      properties:
        itemId: { type: ["string", "null"] }
    PlaidSyncResult:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            type: object
            required: [itemId, added, modified, removed, autoCategorized]
            properties:
              itemId: { type: string }
              institutionName: { type: ["string", "null"] }
              added: { type: integer }
              modified: { type: integer }
              removed: { type: integer }
              autoCategorized: { type: integer }
              error: { type: ["string", "null"] }
              # True when Plaid responded with PRODUCT_NOT_READY (i.e. it is
              # still staging the historical batch for a freshly linked
              # item). The frontend treats this as a transient, non-error
              # state and does NOT show a destructive toast or persist a
              # red error chip.
              stillPreparing: { type: boolean }
    PlaidEnvironmentInfo:
      type: object
      required: [env, configured, nonProdItemCount, nonProdItems]
      properties:
        env:
          type: ["string", "null"]
          enum: [sandbox, development, production, null]
        configured: { type: boolean }
        configError: { type: ["string", "null"] }
        nonProdItemCount: { type: integer }
        nonProdItems:
          type: array
          items:
            type: object
            required: [id, env]
            properties:
              id: { type: string }
              institutionName: { type: ["string", "null"] }
              env: { type: ["string", "null"] }
