    post:
      operationId: createPlaidUpdateLinkToken
      tags: [plaid]
      summary: |
        Create a Plaid Link token in update mode for an existing item, so the
        user can re-authenticate the bank when Plaid reports
        ITEM_LOGIN_REQUIRED (or another re-auth code).
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PlaidUpdateLinkTokenInput" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PlaidLinkToken" }
  /plaid/exchange:
    post:
      operationId: exchangePlaidPublicToken
      tags: [plaid]
      requestBody:
        required: true
        content:
