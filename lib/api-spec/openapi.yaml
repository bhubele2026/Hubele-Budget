openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: H2 Family Budget API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
  - name: dashboard
  - name: transactions
  - name: debts
  - name: recurring
  - name: budget
  - name: mapping
  - name: settings
  - name: import
  - name: forecast
  - name: dashboard-budgets
  - name: auth
  - name: invitations
  - name: members
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema: { $ref: "#/components/schemas/HealthStatus" }

  /dashboard:
    get:
      operationId: getDashboard
      tags: [dashboard]
      summary: Dashboard summary
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DashboardSummary" }

  /transactions:
    get:
      operationId: listTransactions
      tags: [transactions]
      parameters:
        - in: query
          name: from
          schema: { type: string }
        - in: query
          name: to
          schema: { type: string }
        - in: query
          name: limit
          schema: { type: integer }
        - in: query
          name: source
          schema: { type: string }
        - in: query
          name: uncategorized
          schema: { type: boolean }
        - in: query
          name: excludeTransfers
          schema: { type: boolean }
        - in: query
          name: reimbursable
          schema: { type: boolean }
        - in: query
          name: search
          schema: { type: string }
        - in: query
          name: minAmount
          schema: { type: string }
        - in: query
          name: maxAmount
          schema: { type: string }
        - in: query
          name: categoryId
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Transaction" }
    post:
      operationId: createTransaction
      tags: [transactions]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateTransactionInput" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CreateTransactionResponse" }
  /transactions/{id}:
    patch:
      operationId: updateTransaction
      tags: [transactions]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/TransactionInput" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/UpdateTransactionResponse" }
    delete:
      operationId: deleteTransaction
      tags: [transactions]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "204": { description: Deleted }

  /transactions/recategorize-by-pattern:
    post:
      operationId: recategorizeTransactionsByPattern
      tags: [transactions]
      summary: |
        Bulk re-categorize past transactions whose description matches a
        mapping rule's pattern and that currently sit in the rule's old
        category. Used by the "apply this rule to past transactions too"
        prompt that surfaces after the auto-relearn flow repoints a seed
        rule (e.g. an Amex/Cap One/Discover debt-payment rule moving from
        "Misc / Buffer" onto the user's real per-debt category).
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/RecategorizeByPatternInput" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RecategorizeByPatternResult" }

  /transactions/uncategorize-by-ids:
    post:
      operationId: uncategorizeTransactionsByIds
      tags: [transactions]
      summary: |
        Bulk clear the categoryId on a list of transactions, scoped by an
        optional `fromCategoryId` guard so manual edits made between the
        original recategorize and the Undo click are preserved. Used by the
        "Rule added · moved N past transactions" toast on the Mapping Rules
        page so the user can one-click Undo a freshly-added rule's bulk
        sweep — the existing /transactions/recategorize-by-pattern endpoint
        can't model the swap because it requires a non-null toCategoryId.
        Reusable for any future "from anywhere" bulk that needs a null
        target.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UncategorizeByIdsInput" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/UncategorizeByIdsResult" }

  /transactions/bulk-set-forecast-flag:
    post:
      operationId: bulkSetForecastFlag
      tags: [transactions]
      summary: |
        Bulk set the forecast_flag on a list of transactions to a target
        boolean value. Returns the ids that were actually flipped (rows
        whose flag already matched the target are skipped) so the client
        can offer a one-click Undo on the success toast that's safe even
        when the user has since toggled some of the rows back manually.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/BulkSetForecastFlagInput" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/BulkSetForecastFlagResult" }

  /debts:
    get:
      operationId: listDebts
      tags: [debts]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Debt" }
    post:
      operationId: createDebt
      tags: [debts]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/DebtInput" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Debt" }
  /debts/{id}/link:
    post:
      operationId: linkDebtToPlaid
      tags: [debts]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/DebtLinkInput" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Debt" }
  /debts/{id}/unlink:
    post:
      operationId: unlinkDebtFromPlaid
      tags: [debts]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Debt" }
  /debts/{id}/refresh:
    post:
      operationId: refreshDebtFromPlaid
      tags: [debts]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Debt" }
  /plaid/liability-accounts:
    get:
      operationId: listPlaidLiabilityAccounts
      tags: [plaid]
      parameters:
        - in: query
          name: refresh
          schema: { type: boolean }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/PlaidLiabilityAccount" }
  /plaid/liability-accounts/{plaidAccountId}/create-debt:
    post:
      operationId: createDebtFromPlaidAccount
      tags: [plaid]
      parameters:
        - in: path
          name: plaidAccountId
          required: true
          schema: { type: string }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CreateDebtFromPlaidResult" }
        "409":
          description: Already linked to a debt
          content:
            application/json:
              schema:
                type: object
                required: [error]
                properties:
                  error: { type: string }
                  debtId: { type: string }
                  debtName: { type: string }
  /plaid/liability-accounts/create-debts:
    post:
      operationId: bulkCreateDebtsFromPlaidAccounts
      tags: [plaid]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/BulkCreateDebtsFromPlaidRequest" }
      responses:
        "201":
          description: Per-account create/skip results
          content:
            application/json:
              schema: { $ref: "#/components/schemas/BulkCreateDebtsFromPlaidResponse" }
  /debts/balance-history:
    get:
      operationId: listDebtBalanceHistory
      tags: [debts]
      summary: All recorded balance snapshots for the current user's debts
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/DebtBalanceHistoryEntry" }
  /debts/sync-minimums:
    post:
      operationId: syncDebtMinimums
      tags: [debts]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SyncMinimumsResult" }
  /avalanche/extra:
    get:
      operationId: getAvalancheExtra
      tags: [avalanche]
      summary: Resolved monthly extra-payment amount
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AvalancheExtra" }
  /debts/{id}/payments:
    post:
      operationId: createDebtPayment
      tags: [debts]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/DebtPaymentInput" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DebtPaymentResult" }
  /avalanche/settings:
    get:
      operationId: getAvalancheSettings
      tags: [avalanche]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AvalancheSettings" }
    put:
      operationId: updateAvalancheSettings
      tags: [avalanche]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AvalancheSettingsInput" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AvalancheSettings" }
  /debts/{id}:
    patch:
      operationId: updateDebt
      tags: [debts]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/DebtInput" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Debt" }
    delete:
      operationId: deleteDebt
      tags: [debts]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "204": { description: Deleted }

  /recurring-items:
    get:
      operationId: listRecurringItems
      tags: [recurring]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/RecurringItem" }
    post:
      operationId: createRecurringItem
      tags: [recurring]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/RecurringItemInput" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RecurringItem" }
  /recurring-items/{id}:
    patch:
      operationId: updateRecurringItem
      tags: [recurring]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/RecurringItemInput" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RecurringItem" }
    delete:
      operationId: deleteRecurringItem
      tags: [recurring]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "204": { description: Deleted }

  /budget/categories:
    get:
      operationId: listCategories
      tags: [budget]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Category" }
    post:
      operationId: createCategory
      tags: [budget]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CategoryInput" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Category" }
  /budget/categories/{id}:
    delete:
      operationId: deleteCategory
      tags: [budget]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "204": { description: Deleted }

  /budget/months/{monthStart}:
    get:
      operationId: getBudgetMonth
      tags: [budget]
      parameters:
        - in: path
          name: monthStart
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/BudgetMonthDetail" }

  /budget/seed-defaults:
    post:
      operationId: seedDefaultBudget
      tags: [budget]
      summary: Seed default categories and May 2026 budget lines (idempotent)
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SeedDefaultBudgetResult" }

  /budget/lines:
    post:
      operationId: upsertBudgetLine
      tags: [budget]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/BudgetLineInput" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/BudgetLine" }

  /budget/months/{monthStart}/pin:
    post:
      operationId: pinBudgetMonth
      tags: [budget]
      summary: |
        Pin (or unpin) every auto-pulled line in a month to its currently
        displayed planned amount, so the persisted value is preferred over the
        live Bills/Debts derivation. Pinning snapshots the current derived
        amounts into budget_lines; unpinning leaves the snapshot in place but
        causes the response to fall back to the live derivation again.
      parameters:
        - in: path
          name: monthStart
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PinBudgetMonthInput" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PinResult" }

  /budget/lines/pin:
    post:
      operationId: pinBudgetLine
      tags: [budget]
      summary: |
        Pin (or unpin) a single auto-pulled budget line for a given month so
        the persisted planned amount is preferred over the live derivation.
        Pinning snapshots the current derived amount into budget_lines.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PinBudgetLineInput" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PinResult" }

  /mapping-rules:
    get:
      operationId: listMappingRules
      tags: [mapping]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/MappingRule" }
    post:
      operationId: createMappingRule
      tags: [mapping]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/MappingRuleInput" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateMappingRuleResponse"
  /mapping-rules/{id}:
    patch:
      operationId: updateMappingRule
      tags: [mapping]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/MappingRuleInput" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MappingRule" }
    delete:
      operationId: deleteMappingRule
      tags: [mapping]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "204": { description: Deleted }

  /mapping-rules/reorder:
    put:
      operationId: reorderMappingRules
      tags: [mapping]
      description: |
        Replace the priority of every rule whose id appears in `orderedIds`.
        The first id is treated as the highest-priority rule. The server
        rewrites priorities to a contiguous descending sequence so subsequent
        single-rule edits and the auto-learn flow have plenty of headroom on
        either side. Returns the full updated rule list (priority-sorted,
        same shape as GET /mapping-rules).
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ReorderMappingRulesInput" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/MappingRule" }

  /mapping-rules/test:
    post:
      operationId: testMappingRules
      tags: [mapping]
      description: |
        Preview which of the user's mapping rules would match the given
        description, in priority order. The first entry (if any) is the rule
        the auto-categorize flow would actually pick.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/TestMappingRulesInput" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TestMappingRulesResult" }

  /mapping-rules/{id}/recategorize-preview:
    post:
      operationId: previewMappingRuleRecategorize
      tags: [mapping]
      description: |
        Preview how many existing transactions would be affected if the given
        mapping rule's `categoryId` were changed to `toCategoryId`. Returns the
        same `{ candidateCount, sampleTransactions }` shape that PATCH
        /transactions/:id reports for repointed rules, so the Mapping Rules edit
        UI can surface "N past transactions will move into <new category>" and
        a "Show matches" preview before the user saves the edit.

        Read-only — the rule is not modified and no transactions are touched.
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              { $ref: "#/components/schemas/MappingRuleRecategorizePreviewInput" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                {
                  $ref: "#/components/schemas/MappingRuleRecategorizePreview",
                }
        "404":
          description: Rule not found

  /mapping-rules/recategorize-preview-by-pattern:
    post:
      operationId: previewMappingRuleRecategorizeByPattern
      tags: [mapping]
      description: |
        Read-only preview of the bulk-recategorize that *would* happen if the
        Mapping Rules "Add New Rule" form created a rule with the given
        `{ pattern, matchType, toCategoryId }` and then chained
        POST /transactions/recategorize-by-pattern against the older
        *uncategorized* rows it would match. Lets the Add form surface the
        same "N past transactions will move into <new category>" inline banner
        + "Show matches" affordance the edit flow already shows, before the
        user clicks Add.

        `fromCategoryId` is implicitly `null` (uncategorized rows only) since
        no rule exists yet to scope by — mirrors how the post-create
        `ruleAction` toast already counts candidates for brand-new rules.

        Read-only — no rule is created and no transactions are touched.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              {
                $ref: "#/components/schemas/MappingRulePatternRecategorizePreviewInput",
              }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                {
                  $ref: "#/components/schemas/MappingRulePatternRecategorizePreview",
                }

  /settings:
    get:
      operationId: getSettings
      tags: [settings]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Settings" }
    put:
      operationId: updateSettings
      tags: [settings]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/SettingsInput" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Settings" }

  /forecast:
    get:
      operationId: getForecast
      tags: [forecast]
      parameters:
        - in: query
          name: days
          schema: { type: integer }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ForecastBundle" }

  /forecast/settings:
    get:
      operationId: getForecastSettings
      tags: [forecast]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ForecastSettings" }
    put:
      operationId: updateForecastSettings
      tags: [forecast]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ForecastSettingsInput" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ForecastSettings" }

  /forecast/resolutions:
    post:
      operationId: upsertForecastResolution
      tags: [forecast]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ForecastResolutionInput" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ForecastResolution" }
  /forecast/resolutions/{id}:
    delete:
      operationId: deleteForecastResolution
      tags: [forecast]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "204": { description: Deleted }

  /forecast/bank-snapshot:
    post:
      operationId: setForecastBankSnapshot
      tags: [forecast]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/SetBankSnapshotInput" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/BankSnapshot" }
  /forecast/dedupe-transactions:
    post:
      operationId: dedupeTransactions
      tags: [forecast]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DedupeTransactionsReport" }
  /forecast/refresh-bank:
    post:
      operationId: refreshForecastBank
      tags: [forecast]
      requestBody:
        required: false
        content:
          application/json:
            schema: { $ref: "#/components/schemas/RefreshBankInput" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/BankSnapshot" }
  /forecast/cash-signal:
    get:
      operationId: getForecastCashSignal
      tags: [forecast]
      parameters:
        - in: query
          name: horizonDays
          schema: { type: integer }
        - in: query
          name: fromDate
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CashSignal" }

  /forecast/closed-months:
    post:
      operationId: closeForecastMonth
