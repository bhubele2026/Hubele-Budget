      properties:
        linkToken: { type: string }
        expiration: { type: string }
    PlaidUpdateLinkTokenInput:
      type: object
      required: [itemId]
      properties:
        itemId:
          type: string
          description: |
            Internal Plaid item row id (UUID) of the item that needs
            re-authentication. Used to look up the stored access_token and
            create a Plaid Link token in update mode.
    PlaidExchangeInput:
      type: object
      required: [publicToken]
      properties:
        publicToken: { type: string }
        institutionId: { type: ["string", "null"] }
        institutionName: { type: ["string", "null"] }
    PlaidAccount:
      type: object
      required: [id, accountId]
      properties:
        id: { type: string }
        accountId: { type: string }
        name: { type: ["string", "null"] }
        officialName: { type: ["string", "null"] }
        mask: { type: ["string", "null"] }
        type: { type: ["string", "null"] }
        subtype: { type: ["string", "null"] }
        # (#361) First-sync dedupe gate. `importCutoffDate` is the
        # inclusive YYYY-MM-DD upper bound on dates Plaid is allowed
        # to insert during the very first /transactions/sync against
        # this account: rows on/before it are skipped (assumed to
        # overlap manual / imported history the user already has) and
        # rows within ±7 days first try to merge with an unattached
        # manual row at the same amount/date. Auto-detected at link
        # time from existing manual rows; user-overridable via PATCH
        # /plaid/accounts/{id}/import-cutoff while
        # `firstSyncCompletedAt` is still null. Null when no overlap
        # is detected (no gate — same as the legacy behavior).
        importCutoffDate: { type: ["string", "null"] }
        # (#361) Stamped at the end of the first successful
        # /transactions/sync for this account. Until set, the cutoff
        # gate above is active. After it is set, the gate is
        # permanently disabled (subsequent cursor-based syncs behave
        # exactly as today). The Settings date picker hides itself
        # once this timestamp is non-null because the override is no
        # longer accepted.
        firstSyncCompletedAt: { type: ["string", "null"] }
    PlaidItemDetail:
      type: object
      required: [id, itemId, institutionSlug, accounts]
      properties:
        id: { type: string }
        itemId: { type: string }
        institutionId: { type: ["string", "null"] }
        institutionName: { type: ["string", "null"] }
        institutionSlug: { type: string }
        lastSyncedAt: { type: ["string", "null"] }
        lastSyncError: { type: ["string", "null"] }
        lastSyncErrorCode:
          type: ["string", "null"]
          description: |
            Plaid's structured `error_code` from the most recent failed
            sync (e.g. ITEM_LOGIN_REQUIRED, INVALID_CREDENTIALS,
            PENDING_EXPIRATION). Null when sync is healthy or when the
            previous failure had no structured code. Used by the UI to
            decide when to surface the "Reconnect" button next to the
            sync chip.
        # True when Plaid most recently returned PRODUCT_NOT_READY for this
        # item — the bank is still staging its historical batch. The Settings
        # page renders a neutral "Still preparing" badge so the user can tell
        # which institution is in the warm-up window vs. genuinely healthy.
        # Cleared on the next successful sync.
        stillPreparing: { type: boolean }
        # ISO timestamp of when this item first entered the still-preparing
        # state (i.e. when Plaid first returned PRODUCT_NOT_READY for it).
        # The Settings page uses this to render "Preparing for 12m / 3h" so
        # the user can tell a freshly linked bank from one that's stalled.
        # Null whenever stillPreparing is false.
        stillPreparingSince: { type: ["string", "null"] }
        # (#238) Plaid's `consent_expiration_time` cutoff for this item —
        # the date after which the bank link is auto-disconnected unless
        # the user re-consents. Captured at exchange time and refreshed
        # when sync hits PENDING_EXPIRATION / PENDING_DISCONNECT so the
        # value tracks Plaid's latest reported cutoff. Powers the dated
        # subline copy on the page-top reconnect banner, the
        # DebtReauthBanner, and the Settings "Needs reconnect" tooltip
        # ("Chase will disconnect on May 21 — reconnect now to keep it
        # linked."). Null when Plaid does not report a cutoff for this
        # item (most non-OAuth institutions).
        consentExpirationAt: { type: ["string", "null"] }
        # (#258) Wall-clock timestamp of when we last successfully
        # verified `consentExpirationAt` against Plaid (any path: link
        # exchange, sync's PENDING_EXPIRATION refresh, or the daily
        # cron). Updated on every successful /item/get call regardless
        # of whether the cutoff value actually changed, so users and
        # support can answer "is the disconnect countdown the user is
        # seeing fresh?" without diffing logs. Null until the first
        # successful refresh (e.g. for items linked before this column
        # existed).
        consentExpirationLastRefreshedAt: { type: ["string", "null"] }
        # (#265) Latest /item/get failure message captured during the
        # consent-refresh path (manual "Refresh disconnect dates"
        # button, on-sync PENDING_EXPIRATION refresh, or daily cron).
        # Cleared on the next successful refresh. Settings renders
        # this inline under the per-item "Disconnect date checked …"
        # line, styled like the existing lastSyncError block, so a
        # user who walks away after running the refresh can still
        # see *why* this bank's check failed without having to
        # re-trigger it. Distinct from `lastSyncError` so a healthy
        # /transactions/sync does not erase the consent-refresh
        # failure (and vice versa). Null on healthy items.
        consentExpirationLastRefreshError: { type: ["string", "null"] }
        # Plaid `error_code` (e.g. ITEM_LOGIN_REQUIRED) for the
        # consent-refresh failure above, when available. Lets the
        # frontend correlate the inline message with reauth flows.
        consentExpirationLastRefreshErrorCode: { type: ["string", "null"] }
        # (#274) The value of `consentExpirationAt` at the moment the
        # user dismissed the dashboard "consent expiring soon" banner.
        # The dashboard hides this item while the live cutoff still
        # matches; re-consenting (cutoff rolls forward) or a brand-new
        # item entering the window re-shows the alert. Null until the
        # user dismisses the banner for the first time.
        consentWarningDismissedForCutoff: { type: ["string", "null"] }
        # (#408) Categorical bucket derived from `lastSyncErrorCode` — one
        # of: reauth | rate_limit | institution_down | transient | unknown.
        # Null when sync is healthy. Lets clients render reconnect copy
        # without re-deriving the kind from the raw code.
        errorKind: { type: ["string", "null"] }
        # (#408) Newest occurredOn (YYYY-MM-DD) for any Plaid-sourced
        # row (or merged manual row carrying a plaid_account_id) on
        # any account belonging to this item. Drives the post-link
        # "No new transactions since <date>" copy after a relink heal
        # that backfills zero rows. Null when no rows exist yet.
        lastBankTxOn: { type: ["string", "null"] }
        accounts:
          type: array
          items: { $ref: "#/components/schemas/PlaidAccount" }
    PlaidSyncInput:
      type: object
      properties:
        itemId: { type: ["string", "null"] }
    PlaidSyncResult:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            type: object
            required: [itemId, added, modified, removed, autoCategorized, ruleAttributions]
            properties:
              itemId: { type: string }
              # (#357) Row id (`plaid_items.id`) of this item — needed
              # by the client when it dispatches the global
              # "plaid:reconnect" event so the listener can call
              # /plaid/link-token/update with the row id (the external
              # `itemId` above is Plaid's identifier and is NOT what
              # update-mode routes accept).
              plaidItemRowId: { type: ["string", "null"] }
              institutionName: { type: ["string", "null"] }
              added: { type: integer }
              modified: { type: integer }
              removed: { type: integer }
              autoCategorized: { type: integer }
              # Per-rule attribution breakdown for *newly added* rows that
              # the auto-categorize pipeline routed via one of the user's
              # mapping_rules. Sorted by count descending. Drives the
              # "Auto-categorized N new transactions: 5 via 'STARBUCKS', …"
              # summary toast with a "View" link to the touched rules on
              # the Mapping Rules page. `modified` rows are excluded so the
              # toast never inflates when Plaid replays metadata changes
              # for already-categorized historical rows.
              ruleAttributions:
                type: array
                items: { $ref: "#/components/schemas/RuleAttribution" }
              error: { type: ["string", "null"] }
              # True when Plaid responded with PRODUCT_NOT_READY (i.e. it is
              # still staging the historical batch for a freshly linked
              # item). The frontend treats this as a transient, non-error
              # state and does NOT show a destructive toast or persist a
              # red error chip.
              stillPreparing: { type: boolean }
              # (#403) Min / max occurredOn (YYYY-MM-DD) across the rows
              # actually inserted by this sync. Null when nothing was
              # inserted. The post-link "Ready — N added" panel uses
              # this to show "Imported N transactions from Mar 5 –
              # Apr 28" so the user can immediately tell whether the
              # window includes their current month or only historical
              # rows (in which case the panel surfaces a "still
              # importing recent activity" hint instead of a silent
              # success).
              importedDateRange:
                type: ["object", "null"]
                required: [min, max]
                properties:
                  min: { type: string }
                  max: { type: string }
              # (#357) Structured Plaid failure metadata, populated only on
              # error. Lets the frontend toast / inline header banner say
              # "<Institution>: <plain-English reason>" + a Reconnect CTA
              # without ever leaking raw axios "Request failed with status
              # code 400" strings, and lets support correlate user reports
              # back to Plaid's request_id without grepping logs.
              plaidErrorCode: { type: ["string", "null"] }
              plaidErrorMessage: { type: ["string", "null"] }
              # Plaid's `display_message` — when present, this is the
              # user-facing string Plaid itself recommends rendering.
              plaidDisplayMessage: { type: ["string", "null"] }
              # Plaid's `request_id` — quoted in support tickets so we
              # can ask Plaid "what happened on this exact call?".
              requestId: { type: ["string", "null"] }
              # HTTP status returned by Plaid (e.g. 400, 429, 500).
              httpStatus: { type: ["integer", "null"] }
              # Categorical bucket the frontend uses to pick a CTA:
              #   reauth, rate_limit, institution_down, transient, unknown.
              kind:
                type: ["string", "null"]
                enum:
                  - reauth
                  - rate_limit
                  - institution_down
                  - transient
                  - unknown
                  - null
              # (#402) Most recent occurredOn (YYYY-MM-DD) across rows
              # this run actually touched (added ∪ modified). The
              # post-link progress panel uses this to deep-link "View
              # imported transactions" straight to the month with the
              # freshly-imported rows for the just-linked item, instead
              # of falling back to a global most-recent-transaction
              # lookup that can point at an unrelated newer charge from
              # another bank. Null when this run touched no rows or on
              # the failure / still-preparing branches.
              lastOccurredOn: { type: ["string", "null"] }
    PlaidConsentRefreshItem:
      type: object
      required:
        - itemRowId
        - itemId
        - changed
      properties:
        # Server-side row id for the Plaid item (matches PlaidItemDetail.id).
        # Lets the client correlate per-item entries back to the Settings row.
        itemRowId: { type: string }
        # Plaid's `item_id` — included for parity with the manual-trigger
        # response so callers can log/debug without re-fetching.
        itemId: { type: string }
        institutionName: { type: ["string", "null"] }
        # Latest cutoff Plaid reports for this item, ISO timestamp. Null
        # when Plaid does not surface a cutoff (most non-OAuth banks).
        consentExpirationAt: { type: ["string", "null"] }
        # Wall-clock timestamp of when this manual refresh completed
        # successfully (i.e. the value just written into
        # `consent_expiration_last_refreshed_at`). Null when the refresh
        # failed before /item/get returned, so the UI can tell "Plaid
        # said nothing changed" apart from "we never reached Plaid".
        consentExpirationLastRefreshedAt: { type: ["string", "null"] }
        # True when the cutoff value actually moved on this run. The
        # toast counts these as "cutoff updated".
        changed: { type: boolean }
        # Per-item failure message (populated from Plaid's error body).
        # Null on success. The toast surfaces failed items with their
        # institution name so the user knows which bank to reconnect.
        error: { type: ["string", "null"] }
    PlaidConsentRefreshResult:
      type: object
      required: [scanned, updated, failed, items]
      properties:
        scanned: { type: integer }
        updated: { type: integer }
        failed: { type: integer }
        items:
          type: array
          items: { $ref: "#/components/schemas/PlaidConsentRefreshItem" }
    PlaidSyncAttempt:
      type: object
      required: [id, attemptedAt, kind, success]
      properties:
        id: { type: string }
        # ISO timestamp of when the attempt completed (success or fail).
        attemptedAt: { type: string }
        # Which Plaid product call this row records:
        #   * "transactions" — /transactions/sync
        #   * "balance"      — /accounts/balance/get (bank snapshot refresh)
        #   * "liabilities"  — /liabilities/get / /accounts/get fallback
        kind:
          type: string
          enum: [transactions, balance, liabilities]
        success: { type: boolean }
        # Plaid's structured `error_code` when success=false; null on
        # success or when Plaid did not return one.
        errorCode: { type: ["string", "null"] }
        # Human-readable message — Plaid's `error_message` when present,
        # otherwise the underlying error string. Null on success.
        errorMessage: { type: ["string", "null"] }
        # (#357) Enriched per-attempt failure metadata so Settings →
        # Recent activity can render exactly the same structured Plaid
        # failure that the live sync toast renders, including a
        # Reconnect CTA on reauth rows. All optional, populated only
        # for failure rows that came from extractPlaidError().
        plaidDisplayMessage: { type: ["string", "null"] }
        requestId: { type: ["string", "null"] }
        httpStatus: { type: ["integer", "null"] }
        errorKind:
          type: ["string", "null"]
          enum: [reauth, rate_limit, institution_down, transient, unknown, null]
    PlaidSyncAttemptsResult:
      type: object
      required: [attempts]
      properties:
        attempts:
          type: array
          items: { $ref: "#/components/schemas/PlaidSyncAttempt" }
    PlaidEnvironmentInfo:
      type: object
      required: [env, configured, nonProdItemCount, nonProdItems]
      properties:
        env:
          type: ["string", "null"]
          enum: [sandbox, development, production, null]
        configured: { type: boolean }
        configError: { type: ["string", "null"] }
        nonProdItemCount: { type: integer }
        nonProdItems:
          type: array
          items:
            type: object
            required: [id, env]
            properties:
              id: { type: string }
              institutionName: { type: ["string", "null"] }
              env: { type: ["string", "null"] }
