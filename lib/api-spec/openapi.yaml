    post:
      operationId: setAmexAnchor
      tags: [amex]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AmexAnchorInput" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AmexAnchor" }
    delete:
      operationId: deleteAmexAnchor
      tags: [amex]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [ok]
                properties:
                  ok: { type: boolean }

  /dashboard-budgets:
    get:
      operationId: listDashboardBudgets
      tags: [dashboard-budgets]
      parameters:
        - in: query
          name: bucket
          schema: { type: string }
        - in: query
          name: periodKey
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/DashboardBudget" }
    put:
      operationId: upsertDashboardBudget
      tags: [dashboard-budgets]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/DashboardBudgetInput" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DashboardBudget" }
    delete:
      operationId: deleteDashboardBudget
      tags: [dashboard-budgets]
      parameters:
        - in: query
