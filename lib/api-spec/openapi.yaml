openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: H2 Family Budget API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
  - name: dashboard
  - name: transactions
  - name: debts
  - name: recurring
  - name: budget
  - name: mapping
  - name: settings
  - name: import
  - name: forecast
  - name: dashboard-budgets
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema: { $ref: "#/components/schemas/HealthStatus" }

  /dashboard:
    get:
      operationId: getDashboard
      tags: [dashboard]
      summary: Dashboard summary
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DashboardSummary" }

  /transactions:
    get:
      operationId: listTransactions
      tags: [transactions]
      parameters:
        - in: query
          name: from
          schema: { type: string }
        - in: query
          name: to
          schema: { type: string }
        - in: query
          name: limit
          schema: { type: integer }
        - in: query
          name: source
          schema: { type: string }
        - in: query
          name: uncategorized
          schema: { type: boolean }
        - in: query
          name: search
          schema: { type: string }
        - in: query
          name: minAmount
          schema: { type: string }
        - in: query
          name: maxAmount
          schema: { type: string }
        - in: query
          name: categoryId
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Transaction" }
    post:
      operationId: createTransaction
      tags: [transactions]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateTransactionInput" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Transaction" }
  /transactions/{id}:
    patch:
      operationId: updateTransaction
      tags: [transactions]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/TransactionInput" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Transaction" }
    delete:
      operationId: deleteTransaction
      tags: [transactions]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "204": { description: Deleted }

  /debts:
    get:
      operationId: listDebts
      tags: [debts]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Debt" }
    post:
      operationId: createDebt
      tags: [debts]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/DebtInput" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Debt" }
  /debts/{id}/link:
    post:
      operationId: linkDebtToPlaid
      tags: [debts]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/DebtLinkInput" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Debt" }
  /debts/{id}/unlink:
    post:
      operationId: unlinkDebtFromPlaid
      tags: [debts]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Debt" }
  /debts/{id}/refresh:
    post:
      operationId: refreshDebtFromPlaid
      tags: [debts]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Debt" }
  /plaid/liability-accounts:
    get:
      operationId: listPlaidLiabilityAccounts
      tags: [plaid]
      parameters:
        - in: query
          name: refresh
          schema: { type: boolean }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/PlaidLiabilityAccount" }
  /debts/sync-minimums:
    post:
      operationId: syncDebtMinimums
      tags: [debts]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SyncMinimumsResult" }
  /avalanche/extra:
    get:
      operationId: getAvalancheExtra
      tags: [avalanche]
      summary: Resolved monthly extra-payment amount
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AvalancheExtra" }
  /debts/{id}/payments:
    post:
      operationId: createDebtPayment
      tags: [debts]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/DebtPaymentInput" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DebtPaymentResult" }
  /avalanche/settings:
    get:
      operationId: getAvalancheSettings
      tags: [avalanche]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AvalancheSettings" }
    put:
      operationId: updateAvalancheSettings
      tags: [avalanche]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AvalancheSettingsInput" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AvalancheSettings" }
  /debts/{id}:
    patch:
      operationId: updateDebt
      tags: [debts]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/DebtInput" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Debt" }
    delete:
      operationId: deleteDebt
      tags: [debts]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "204": { description: Deleted }

  /recurring-items:
    get:
      operationId: listRecurringItems
      tags: [recurring]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/RecurringItem" }
    post:
      operationId: createRecurringItem
      tags: [recurring]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/RecurringItemInput" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RecurringItem" }
  /recurring-items/{id}:
    patch:
      operationId: updateRecurringItem
      tags: [recurring]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/RecurringItemInput" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RecurringItem" }
    delete:
      operationId: deleteRecurringItem
      tags: [recurring]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "204": { description: Deleted }

  /budget/categories:
    get:
      operationId: listCategories
      tags: [budget]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Category" }
    post:
      operationId: createCategory
      tags: [budget]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CategoryInput" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Category" }
  /budget/categories/{id}:
    delete:
      operationId: deleteCategory
      tags: [budget]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "204": { description: Deleted }

  /budget/months/{monthStart}:
    get:
      operationId: getBudgetMonth
      tags: [budget]
      parameters:
        - in: path
          name: monthStart
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/BudgetMonthDetail" }

  /budget/seed-defaults:
    post:
      operationId: seedDefaultBudget
      tags: [budget]
      summary: Seed default categories and May 2026 budget lines (idempotent)
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SeedDefaultBudgetResult" }

  /budget/lines:
    post:
      operationId: upsertBudgetLine
      tags: [budget]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/BudgetLineInput" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/BudgetLine" }

  /mapping-rules:
    get:
      operationId: listMappingRules
      tags: [mapping]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/MappingRule" }
    post:
      operationId: createMappingRule
      tags: [mapping]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/MappingRuleInput" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MappingRule" }
  /mapping-rules/{id}:
    delete:
      operationId: deleteMappingRule
      tags: [mapping]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "204": { description: Deleted }

  /settings:
    get:
      operationId: getSettings
      tags: [settings]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Settings" }
    put:
      operationId: updateSettings
      tags: [settings]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/SettingsInput" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Settings" }

  /forecast:
    get:
      operationId: getForecast
      tags: [forecast]
      parameters:
        - in: query
          name: days
          schema: { type: integer }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ForecastBundle" }

  /forecast/settings:
    get:
      operationId: getForecastSettings
      tags: [forecast]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ForecastSettings" }
    put:
      operationId: updateForecastSettings
      tags: [forecast]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ForecastSettingsInput" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ForecastSettings" }

  /forecast/resolutions:
    post:
      operationId: upsertForecastResolution
      tags: [forecast]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ForecastResolutionInput" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ForecastResolution" }
  /forecast/resolutions/{id}:
    delete:
      operationId: deleteForecastResolution
      tags: [forecast]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "204": { description: Deleted }

  /forecast/bank-snapshot:
    post:
      operationId: setForecastBankSnapshot
      tags: [forecast]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/SetBankSnapshotInput" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/BankSnapshot" }
  /forecast/refresh-bank:
    post:
      operationId: refreshForecastBank
      tags: [forecast]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/BankSnapshot" }
  /forecast/cash-signal:
    get:
      operationId: getForecastCashSignal
      tags: [forecast]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CashSignal" }

  /forecast/closed-months:
    post:
      operationId: closeForecastMonth
      tags: [forecast]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [monthKey]
              properties:
                monthKey: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ForecastClosedMonth" }
  /forecast/closed-months/{monthKey}:
    delete:
      operationId: reopenForecastMonth
      tags: [forecast]
      parameters:
        - in: path
          name: monthKey
          required: true
          schema: { type: string }
      responses:
        "204": { description: Deleted }

  /dashboard-budgets:
    get:
      operationId: listDashboardBudgets
      tags: [dashboard-budgets]
      parameters:
        - in: query
          name: bucket
          schema: { type: string }
        - in: query
          name: periodKey
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/DashboardBudget" }
    put:
      operationId: upsertDashboardBudget
      tags: [dashboard-budgets]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/DashboardBudgetInput" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DashboardBudget" }

  /plaid/link-token:
    post:
      operationId: createPlaidLinkToken
      tags: [plaid]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PlaidLinkToken" }
  /plaid/exchange:
    post:
      operationId: exchangePlaidPublicToken
      tags: [plaid]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PlaidExchangeInput" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PlaidItemDetail" }
  /plaid/items:
    get:
      operationId: listPlaidItems
      tags: [plaid]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/PlaidItemDetail" }
  /plaid/items/{id}:
    delete:
      operationId: deletePlaidItem
      tags: [plaid]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "204": { description: Deleted }
  /plaid/sync:
    post:
      operationId: syncPlaidTransactions
      tags: [plaid]
      requestBody:
        required: false
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PlaidSyncInput" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PlaidSyncResult" }

  /import/workbook:
    post:
      operationId: importWorkbook
      tags: [import]
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ImportSummary" }

components:
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status: { type: string }

    Transaction:
      type: object
      required: [id, occurredOn, description, amount, forecastFlag, weeklyAllowance, monthlyAllowance, unplannedAllowance, reimbursable, reimbursed, source]
      properties:
        id: { type: string }
        occurredOn: { type: string }
        description: { type: string }
        amount: { type: string }
        account: { type: ["string", "null"] }
        categoryId: { type: ["string", "null"] }
        forecastFlag: { type: boolean }
        weeklyAllowance: { type: boolean }
        weeklyBucket: { type: ["string", "null"], enum: [groceries, dining, entertainment, misc, null] }
        monthlyAllowance: { type: boolean }
        unplannedAllowance: { type: boolean }
        reimbursable: { type: boolean }
        reimbursed: { type: boolean }
        notes: { type: ["string", "null"] }
        source: { type: string }
        member: { type: ["string", "null"] }
        owedBy: { type: ["string", "null"] }
        plaidTransactionId: { type: ["string", "null"] }
        plaidAccountId: { type: ["string", "null"] }
    CreateTransactionInput:
      type: object
      required: [occurredOn, description, amount]
      properties:
        occurredOn: { type: string }
        description: { type: string, minLength: 1 }
        amount: { type: string }
        account: { type: ["string", "null"] }
        categoryId: { type: ["string", "null"] }
        forecastFlag: { type: boolean }
        weeklyAllowance: { type: boolean }
        weeklyBucket: { type: ["string", "null"], enum: [groceries, dining, entertainment, misc, null] }
        monthlyAllowance: { type: boolean }
        unplannedAllowance: { type: boolean }
        reimbursable: { type: boolean }
        reimbursed: { type: boolean }
        notes: { type: ["string", "null"] }
        source: { type: string }
        member: { type: ["string", "null"] }
        owedBy: { type: ["string", "null"] }
    TransactionInput:
      type: object
      properties:
        occurredOn: { type: string }
        description: { type: string, minLength: 1 }
        amount: { type: string }
        account: { type: ["string", "null"] }
        categoryId: { type: ["string", "null"] }
        forecastFlag: { type: boolean }
        weeklyAllowance: { type: boolean }
        weeklyBucket: { type: ["string", "null"], enum: [groceries, dining, entertainment, misc, null] }
        monthlyAllowance: { type: boolean }
        unplannedAllowance: { type: boolean }
        reimbursable: { type: boolean }
        reimbursed: { type: boolean }
        notes: { type: ["string", "null"] }
        source: { type: string }
        member: { type: ["string", "null"] }
        owedBy: { type: ["string", "null"] }

    Debt:
      type: object
      required: [id, name, balance, apr, minPayment, payment, status, sortOrder, balanceSource, aprSource, minPaymentSource]
      properties:
        id: { type: string }
        name: { type: string }
        balance: { type: string }
        apr: { type: string }
        minPayment: { type: string }
        payment: { type: string }
        type: { type: ["string", "null"] }
        status: { type: string }
        sortOrder: { type: integer }
        dueDay: { type: ["integer", "null"] }
        statementDay: { type: ["integer", "null"] }
        notes: { type: ["string", "null"] }
        lastBalanceUpdate: { type: ["string", "null"] }
        plaidAccountId: { type: ["string", "null"] }
        plaidLastSyncedAt: { type: ["string", "null"] }
        balanceSource: { type: string, enum: [plaid, manual] }
        aprSource: { type: string, enum: [plaid, manual] }
        minPaymentSource: { type: string, enum: [plaid, manual] }
        plaidAccount:
          oneOf:
            - $ref: "#/components/schemas/DebtPlaidAccount"
            - type: "null"
    DebtPlaidAccount:
      type: object
      required: [id]
      properties:
        id: { type: string }
        name: { type: ["string", "null"] }
        mask: { type: ["string", "null"] }
        type: { type: ["string", "null"] }
        subtype: { type: ["string", "null"] }
        liabilityKind: { type: ["string", "null"] }
        institutionName: { type: ["string", "null"] }
        institutionSlug: { type: ["string", "null"] }
    DebtInput:
      type: object
      properties:
        name: { type: string, minLength: 1 }
        balance: { type: string }
        apr: { type: string }
        minPayment: { type: string }
        payment: { type: string }
        type: { type: ["string", "null"] }
        status: { type: string }
        sortOrder: { type: integer }
        dueDay: { type: ["integer", "null"] }
        statementDay: { type: ["integer", "null"] }
        notes: { type: ["string", "null"] }
        lastBalanceUpdate: { type: ["string", "null"] }
    DebtLinkInput:
      type: object
      required: [plaidAccountId]
      properties:
        plaidAccountId: { type: string }
    PlaidLiabilityAccount:
      type: object
      required: [id, accountId]
      properties:
        id: { type: string }
        accountId: { type: string }
        name: { type: ["string", "null"] }
        officialName: { type: ["string", "null"] }
        mask: { type: ["string", "null"] }
        type: { type: ["string", "null"] }
        subtype: { type: ["string", "null"] }
        liabilityKind: { type: ["string", "null"] }
        balance: { type: ["string", "null"] }
        apr: { type: ["string", "null"] }
        minPayment: { type: ["string", "null"] }
        lastFetchedAt: { type: ["string", "null"] }
        institutionId: { type: ["string", "null"] }
        institutionName: { type: ["string", "null"] }
        institutionSlug: { type: ["string", "null"] }
        linkedDebt:
          oneOf:
            - type: object
              required: [id, name]
              properties:
                id: { type: string }
                name: { type: string }
            - type: "null"
    AvalancheSettings:
      type: object
      required: [strategy, extraSource, manualExtra, budgetMode]
      properties:
        strategy: { type: string, enum: [avalanche, snowball] }
        extraSource: { type: string, enum: [budget_net, budget_line, manual] }
        extraBudgetCategoryId: { type: ["string", "null"] }
        manualExtra: { type: string }
