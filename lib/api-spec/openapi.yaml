      operationId: deletePlaidItem
      tags: [plaid]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "204": { description: Deleted }
  /plaid/items/{id}/sync-attempts:
    get:
      operationId: listPlaidSyncAttempts
      tags: [plaid]
      summary: |
        (#279) Most recent Plaid sync attempts for a single linked item.
        Powers the Settings → Linked banks "Recent activity" expander
        so users can spot a flaky bank link (e.g. "failed 4 of the
        last 10 syncs") instead of only seeing the latest
        `lastSyncError` snapshot. Newest first; capped server-side at
        ~20 rows.
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PlaidSyncAttemptsResult" }
        "404": { description: Plaid item not found }
  /plaid/accounts/{id}/import-cutoff:
    patch:
      operationId: updatePlaidImportCutoffDate
      tags: [plaid]
      summary: |
        (#361) Override the first-sync `import_cutoff_date` for a
        single Plaid account. Allowed only while
        `firstSyncCompletedAt` is still null — once the first sync
        has stamped that timestamp the gate is permanently off and a
        later override would silently do nothing (returns 409
        instead). Pass `null` to clear the cutoff so the first sync
        inserts every row Plaid returns.
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [importCutoffDate]
              properties:
                importCutoffDate: { type: ["string", "null"] }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [id, importCutoffDate, firstSyncCompletedAt]
                properties:
                  id: { type: string }
                  importCutoffDate: { type: ["string", "null"] }
                  firstSyncCompletedAt: { type: ["string", "null"] }
        "400": { description: Invalid date }
        "404": { description: Plaid account not found }
        "409": { description: First sync already completed }
  /plaid/items/{id}/dismiss-expiration-warning:
    post:
      operationId: dismissPlaidExpirationWarning
      tags: [plaid]
      summary: |
        (#274) Persist the user's dismissal of the dashboard "bank
        consent expiring soon" banner for this item. The server stamps
        `consentWarningDismissedForCutoff` with the current
        `consentExpirationAt`, so the alert stays hidden across page
        reloads but re-surfaces automatically if Plaid moves the
        cutoff (e.g. after a successful re-consent).
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PlaidItemDetail" }
  /plaid/sync:
