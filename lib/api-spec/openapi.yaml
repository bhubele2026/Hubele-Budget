      operationId: syncPlaidTransactions
      tags: [plaid]
      requestBody:
        required: false
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PlaidSyncInput" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PlaidSyncResult" }
  /plaid/environment:
