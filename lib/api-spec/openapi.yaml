      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ForecastClosedMonth" }
  /forecast/closed-months/{monthKey}:
    delete:
      operationId: reopenForecastMonth
      tags: [forecast]
      parameters:
        - in: path
