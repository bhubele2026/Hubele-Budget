name: CI

# Phase 1 guardrail: run typecheck + the full test suites on every push and
# PR so nothing silently breaks. ~180 test files had no automated runner
# before this. Fail the build on any failure; never weaken a test to go green.
on:
  push:
    branches: ["**"]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  # Match Replit's toolchain (Node 24 + pnpm 10) so the committed lockfile's
  # `overrides` snapshot validates under --frozen-lockfile. pnpm 9 normalizes
  # overrides differently (ERR_PNPM_LOCKFILE_CONFIG_MISMATCH); pnpm 11 ignores
  # the onlyBuiltDependencies allowlist and hard-fails on build scripts.
  PNPM_VERSION: 10.34.3
  NODE_VERSION: 24

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      # Write CI-only pnpm settings to .npmrc BEFORE install so they also
      # apply to pnpm's verify-deps-before-run auto-reinstall on `pnpm run`:
      #  - strict-dep-builds=false: don't hard-fail on un-approved build
      #    scripts (e.g. @clerk/shared); esbuild/@swc ARE built via the
      #    onlyBuiltDependencies allowlist in pnpm-workspace.yaml.
      #  - verify-deps-before-run=false: skip the pre-`run` auto-reinstall.
      - run: |
          printf '\nstrict-dep-builds=false\nverify-deps-before-run=false\n' >> .npmrc
          pnpm install --frozen-lockfile
      - run: pnpm run typecheck

  web-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      # Write CI-only pnpm settings to .npmrc BEFORE install so they also
      # apply to pnpm's verify-deps-before-run auto-reinstall on `pnpm run`:
      #  - strict-dep-builds=false: don't hard-fail on un-approved build
      #    scripts (e.g. @clerk/shared); esbuild/@swc ARE built via the
      #    onlyBuiltDependencies allowlist in pnpm-workspace.yaml.
      #  - verify-deps-before-run=false: skip the pre-`run` auto-reinstall.
      - run: |
          printf '\nstrict-dep-builds=false\nverify-deps-before-run=false\n' >> .npmrc
          pnpm install --frozen-lockfile
      - name: Web unit tests (jsdom — no DB)
        run: pnpm --filter ./artifacts/h2budget run test

  api-tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: h2budget_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/h2budget_test
      # api-server integration tests force a sandbox Plaid env via their own
      # setup file; Clerk middleware just needs a syntactically-valid key.
      CLERK_PUBLISHABLE_KEY: pk_test_ci-placeholder
      CLERK_SECRET_KEY: sk_test_ci-placeholder
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      # Write CI-only pnpm settings to .npmrc BEFORE install so they also
      # apply to pnpm's verify-deps-before-run auto-reinstall on `pnpm run`:
      #  - strict-dep-builds=false: don't hard-fail on un-approved build
      #    scripts (e.g. @clerk/shared); esbuild/@swc ARE built via the
      #    onlyBuiltDependencies allowlist in pnpm-workspace.yaml.
      #  - verify-deps-before-run=false: skip the pre-`run` auto-reinstall.
      - run: |
          printf '\nstrict-dep-builds=false\nverify-deps-before-run=false\n' >> .npmrc
          pnpm install --frozen-lockfile
      - name: API integration tests (pushes schema via pretest)
        run: pnpm --filter ./artifacts/api-server run test

  # Production build gate. `typecheck` above proves the types are sound, but it
  # never bundles — Vite/esbuild build errors (e.g. a generated export that
  # drifted from the OpenAPI spec) first surfaced on the Replit deploy, which is
  # exactly the "broken deploy" class this pipeline exists to block. Run the same
  # root `build` Replit runs (typecheck + `pnpm -r run build`) so a build that
  # would fail the deploy fails the PR instead.
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      # Write CI-only pnpm settings to .npmrc BEFORE install so they also
      # apply to pnpm's verify-deps-before-run auto-reinstall on `pnpm run`:
      #  - strict-dep-builds=false: don't hard-fail on un-approved build
      #    scripts (e.g. @clerk/shared); esbuild/@swc ARE built via the
      #    onlyBuiltDependencies allowlist in pnpm-workspace.yaml.
      #  - verify-deps-before-run=false: skip the pre-`run` auto-reinstall.
      - run: |
          printf '\nstrict-dep-builds=false\nverify-deps-before-run=false\n' >> .npmrc
          pnpm install --frozen-lockfile
      - name: Production build (same command Replit deploys)
        run: pnpm run build

  # Playwright e2e needs a booted app + Clerk test credentials + browsers.
  # Opt-in until those secrets/profile exist (set repo variable E2E_ENABLED=true)
  # so a credentials gap doesn't block every PR. This is deferral, not a
  # weakened test — the suite still runs, just once it can actually pass.
  e2e:
    if: ${{ vars.E2E_ENABLED == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      # Write CI-only pnpm settings to .npmrc BEFORE install so they also
      # apply to pnpm's verify-deps-before-run auto-reinstall on `pnpm run`:
      #  - strict-dep-builds=false: don't hard-fail on un-approved build
      #    scripts (e.g. @clerk/shared); esbuild/@swc ARE built via the
      #    onlyBuiltDependencies allowlist in pnpm-workspace.yaml.
      #  - verify-deps-before-run=false: skip the pre-`run` auto-reinstall.
      - run: |
          printf '\nstrict-dep-builds=false\nverify-deps-before-run=false\n' >> .npmrc
          pnpm install --frozen-lockfile
      - run: pnpm --filter ./artifacts/h2budget exec playwright install --with-deps
      - run: pnpm --filter ./artifacts/h2budget run test:e2e
